<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>DK邻里 · 课时查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f8f9fb;color:#1e293b;min-height:100vh}
.container{max-width:420px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 0}
.header .logo{font-size:24px;font-weight:800;color:#b45309;letter-spacing:1px}
.header .sub{color:#64748b;font-size:13px;margin-top:4px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:14px;font-weight:600;color:#64748b;margin-bottom:10px}
.search-box{display:flex;gap:8px;margin-bottom:8px}
.search-box input{flex:1;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none}
.search-box input:focus{border-color:#f59e0b}
.search-box button{padding:10px 16px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.search-box button:active{opacity:.9}
.result-list{margin-top:8px}
.result-item{padding:10px 12px;background:#f8fafc;border-radius:8px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.result-item:hover{background:#f1f5f9}
.result-item .name{font-weight:600;color:#1e293b}
.result-item .class-name{font-size:12px;color:#64748b}

/* 学员信息大卡片 */
.student-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700}
.student-info h2{font-size:20px;font-weight:700;color:#1e293b}
.student-info .tag{font-size:12px;color:#64748b;margin-top:2px}
.student-info .grad-label{font-size:15px;font-weight:700;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;padding:1px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;white-space:nowrap}

/* 课时统计 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-item{text-align:center;padding:14px 8px;background:#f8fafc;border-radius:10px}
.stat-item .num{font-size:24px;font-weight:700;color:#1e293b}
.stat-item .label{font-size:12px;color:#64748b;margin-top:2px}
.stat-item.used .num{color:#059669}
.stat-item.remain .num{color:#2563eb}
.stat-item.warn .num{color:#dc2626}
.stat-item.leave .num{color:#dc2626}

/* 续费提醒 */
.alert-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px;text-align:center;margin-bottom:16px}
.alert-box .alert-icon{font-size:24px;margin-bottom:4px}
.alert-box .alert-text{font-size:15px;font-weight:700;color:#b91c1c}
.alert-box .alert-sub{font-size:12px;color:#ef4444;margin-top:4px}

/* 进度条 */
.progress-section{margin-bottom:16px}
.progress-bar-bg{height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;margin-top:6px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:6px;transition:width .5s ease}
.progress-text{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-top:4px}

/* 月度明细 */
.month-table{width:100%;border-collapse:collapse;font-size:13px}
.month-table th{text-align:left;padding:8px 4px;color:#64748b;font-weight:500;border-bottom:1px solid #e2e8f0}
.month-table td{padding:8px 4px;border-bottom:1px solid #f1f5f9}
.month-table td:last-child{text-align:right;font-weight:600;color:#059669}
.month-table tr:last-child td{border-bottom:none}

.empty-state{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px}
.loading{text-align:center;padding:40px;color:#64748b}
.back-btn{display:inline-block;padding:8px 16px;background:#f1f5f9;color:#475569;border-radius:8px;font-size:13px;text-decoration:none;margin-top:8px;cursor:pointer}
.back-btn:hover{background:#e2e8f0}
.refresh-btn{display:inline-block;padding:8px 16px;background:#3b82f6;color:#fff;border-radius:8px;font-size:13px;text-decoration:none;margin-top:8px;margin-left:8px;cursor:pointer}
.refresh-btn:hover{background:#2563eb}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">⏳ 加载中...</div>
</div>

<script>
// 自动处理缓存，确保每次打开都是最新版本
(function() {
  if (!location.search.includes('_nocache_') && !sessionStorage.getItem('cache_busted')) {
    sessionStorage.setItem('cache_busted', '1');
    var sep = location.search ? '&' : '?';
    location.replace(location.href + sep + '_nocache_=' + Date.now());
  }
})();

// ═══════════════════════════════════════
// Supabase 配置（与教务/销售系统共用）
// ═══════════════════════════════════════
const SUPABASE_URL = 'https://chasxggorljjqqmficnh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoYXN4Z2dvcmxqanFxbWZpY25oIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTUwMjU3MiwiZXhwIjoyMDk3MDc4NTcyfQ.j6B2y8ZUgsO7WGrv4Aypho4qiqDrwkJ5O0HxiQfvbjY';

// 原生 fetch 请求 Supabase REST API
function supabaseFetch(table, select) {
  const url = SUPABASE_URL + '/rest/v1/' + table + '?select=' + encodeURIComponent(select);
  return fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Accept': 'application/json'
    }
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(j) { throw new Error('HTTP ' + r.status + ': ' + JSON.stringify(j)); });
    return r.json();
  });
}

let _students = [], _classes = [], _attendance = [], _leaves = [];

// ═══════════════════════════════════════
// 页面初始化
// ═══════════════════════════════════════
async function init() {
  const params = new URLSearchParams(location.search);
  const studentId = params.get('studentId');
  const name = params.get('name');

  await loadData();

  if (studentId) {
    showStudent(parseInt(studentId));
  } else if (name) {
    searchByName(name);
  } else {
    showSearch();
  }
}

async function loadData() {
  try {
    let s1, s2, s3;
    if (typeof supabase !== 'undefined' && supabase.createClient) {
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const [r1, r2, r3, r4] = await Promise.all([
        sb.from('students').select('*'),
        sb.from('classes').select('*'),
        sb.from('attendance').select('*'),
        sb.from('leaves').select('*')
      ]);
      if (r1.error || r2.error || r3.error) {
        document.getElementById('app').innerHTML = '<div class="empty-state">数据加载异常：' + (r1.error?.message || r2.error?.message || r3.error?.message) + '</div>';
        return;
      }
      s1 = r1.data; s2 = r2.data; s3 = r3.data; s4 = r4.data || [];
    } else {
      let s4;
      [s1, s2, s3, s4] = await Promise.all([
        supabaseFetch('students', '*'),
        supabaseFetch('classes', '*'),
        supabaseFetch('attendance', '*'),
        supabaseFetch('leaves', '*')
      ]);
      _leaves = Array.isArray(s4) ? s4 : [];
    }
    _students = Array.isArray(s1) ? s1 : [];
    _classes = Array.isArray(s2) ? s2 : [];
    _attendance = Array.isArray(s3) ? s3 : [];
    _leaves = Array.isArray(s4) ? s4 : [];
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="empty-state">数据加载失败：' + (e.message || '请检查网络') + '</div>';
  }
}

async function refreshData(studentId) {
  const btn = document.querySelector('.refresh-btn');
  if (btn) { btn.textContent = '刷新中...'; btn.style.opacity = '0.7'; }
  await loadData();
  showStudent(studentId);
}

// ═══════════════════════════════════════
// 搜索页面
// ═══════════════════════════════════════
function showSearch() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="header">' +
    '<div class="logo">DK·邻里少儿英语</div>' +
    '<div class="sub">在读学员课时查询</div>' +
  '</div>' +
  '<div class="card">' +
    '<div class="card-title">请输入查询信息</div>' +
    '<div class="search-box" style="margin-bottom:10px">' +
      '<input type="text" id="searchInput" placeholder="孩子姓名" onkeydown="if(event.key===\'Enter\')doSearch()">' +
    '</div>' +
    '<div class="search-box">' +
      '<input type="text" id="phoneInput" placeholder="家长手机尾号4位" maxlength="4" onkeydown="if(event.key===\'Enter\')doSearch()">' +
      '<button onclick="doSearch()">查询</button>' +
    '</div>' +
    '<div id="searchResult" class="result-list"></div>' +
  '</div>';
}

function doSearch() {
  const name = document.getElementById('searchInput').value.trim();
  const phoneTail = document.getElementById('phoneInput').value.trim();
  if (!name) {
    document.getElementById('searchResult').innerHTML = '<div class="empty-state">请输入孩子姓名</div>';
    return;
  }
  if (!phoneTail || phoneTail.length !== 4 || !/^\d{4}$/.test(phoneTail)) {
    document.getElementById('searchResult').innerHTML = '<div class="empty-state">请输入家长手机尾号4位数字</div>';
    return;
  }
  searchByName(name, phoneTail);
}

function searchByName(name, phoneTail) {
  const list = _students.filter(function(s) {
    return s.name && s.name.indexOf(name) !== -1 && s.phone && s.phone.slice(-4) === phoneTail;
  });
  if (list.length === 0) {
    document.getElementById('searchResult').innerHTML = '<div class="empty-state">未找到匹配的学员信息，请检查姓名和手机尾号</div>';
    return;
  }
  if (list.length === 1) {
    showStudent(list[0].id);
    return;
  }
  let html = '';
  list.forEach(function(s) {
    const cls = _classes.find(function(c) { return c.id === s.class_id; });
    const sAtt = _attendance.filter(function(a) { return a.student_id === s.id; });
    const sUsed = sAtt.reduce(function(sum, a) { return sum + (parseFloat(a.hours) || 0); }, 0);
    const sPaid = parseFloat(s.paid_hours) || 0;
    const sRemain = Math.max(0, Math.round((sPaid - sUsed) * 10) / 10);
    html += '<div class="result-item" onclick="showStudent(' + s.id + ')">' +
      '<span class="name">' + s.name + '</span>' +
      '<span class="class-name">' + (cls ? cls.name : '') + ' · 剩余' + sRemain + '课时</span>' +
    '</div>';
  });
  document.getElementById('searchResult').innerHTML = html;
}

// ═══════════════════════════════════════
// 学员详情展示
// ═══════════════════════════════════════
function showStudent(studentId) {
  const student = _students.find(function(s) { return s.id === studentId; });
  if (!student) {
    document.getElementById('app').innerHTML = '<div class="empty-state">未找到学员信息</div><a class="back-btn" onclick="showSearch()">返回查询</a>';
    return;
  }
  const cls = _classes.find(function(c) { return c.id === student.class_id; });
  const clsName = cls ? cls.name : '';
  const phase = cls ? cls.phase : '';

  const att = _attendance.filter(function(a) { return a.student_id === studentId; });
  const usedHours = att.reduce(function(sum, a) { return sum + (parseFloat(a.hours) || 0); }, 0);
  const paidHours = parseFloat(student.paid_hours) || 0;
  const remainHours = Math.max(0, Math.round((paidHours - usedHours) * 10) / 10);

  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;

  // 本年度请假课时合计
  const leaves = _leaves.filter(function(l) { return l.student_id === studentId && l.year === currentYear; });
  const leaveHours = leaves.reduce(function(sum, l) { return sum + (parseFloat(l.hours) || 0); }, 0);

  // 生成3月到当前月份的列表，没有出勤记录的月份显示0
  const monthRows = [];
  for (let m = 3; m <= currentMonth; m++) {
    const record = att.find(function(a) { return a.year === currentYear && a.month === m; });
    const hours = record ? (parseFloat(record.hours) || 0) : 0;
    monthRows.push('<tr><td>' + currentYear + '年' + m + '月</td><td>' + hours + ' 课时</td></tr>');
  }
  const monthRowsHtml = monthRows.join('');

  const classTotal = parseFloat(cls && cls.total_hours) || 0;
  const classProgress = calcClassProgress(cls);
  const classCumulative = classProgress.cumulative;
  const progressPct = classProgress.pct;

  // 辅助：计算班级进度（3月到当前月累计 / 阶段总课时）
  function calcClassProgress(cls) {
    if (!cls) return { total: 0, cumulative: 0, pct: 0 };
    const total = parseFloat(cls.total_hours) || 0;
    let cumulative = 0;
    for (let m = 3; m <= currentMonth; m++) {
      cumulative += (cls['m' + m] || 0);
    }
    const pct = total > 0 ? Math.min(100, Math.round((cumulative / total) * 100)) : 0;
    return { total, cumulative, pct };
  }

  const isWarning = remainHours <= 10 && remainHours > 0;
  const isEmpty = remainHours <= 0;
  const gradLabel = (student.status === '毕业' && remainHours <= 0) ? '已结课待续费' : '';

  let html = '<div class="header">' +
    '<div class="logo">DK·邻里少儿英语</div>' +
    '<div class="sub">在读学员课时查询</div>' +
  '</div>';

  html += '<div class="card">' +
    '<div class="student-header">' +
      '<div class="avatar">' + (student.name ? student.name.charAt(0) : '学') + '</div>' +
      '<div class="student-info">' +
        '<h2>' + student.name + (gradLabel ? '<span class="grad-label">' + gradLabel + '</span>' : '') + '</h2>' +
        '<div class="tag">' + clsName + ' · ' + phase + '阶段</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  if (isWarning) {
    html += '<div class="alert-box">' +
      '<div class="alert-icon">⚠️</div>' +
      '<div class="alert-text">剩余课时不多，建议您尽快续费</div>' +
      '<div class="alert-sub">当前剩余 ' + remainHours + ' 课时</div>' +
    '</div>';
  } else if (isEmpty) {
    html += '<div class="alert-box" style="background:#fef2f2;border-color:#fecaca">' +
      '<div class="alert-icon">🚫</div>' +
      '<div class="alert-text">课时已用完，请尽快续费</div>' +
      '<div class="alert-sub">当前剩余 0 课时</div>' +
    '</div>';
  }

  html += '<div class="card">' +
    '<div class="card-title">课时统计</div>' +
    '<div class="stats-grid">' +
      '<div class="stat-item"><div class="num">' + paidHours + '</div><div class="label">购买课时</div></div>' +
      '<div class="stat-item used"><div class="num">' + usedHours + '</div><div class="label">已上课</div></div>' +
      '<div class="stat-item leave"><div class="num">' + leaveHours + '</div><div class="label">请假课时</div></div>' +
      '<div class="stat-item remain"><div class="num">' + remainHours + '</div><div class="label">剩余课时</div></div>' +
    '</div>' +
  '</div>';

  // 历史班级进度（已毕业/已结课的班级）
  const classHistory = (function parseHistory() {
    const raw = student.class_history;
    if (Array.isArray(raw)) return raw;
    if (typeof raw === 'string' && raw.trim()) {
      try { return JSON.parse(raw); } catch (e) { return []; }
    }
    return [];
  })();
  classHistory.forEach(function(h) {
    const hCls = _classes.find(function(c) { return c.id === h.class_id; });
    if (!hCls) return;
    const hProg = calcClassProgress(hCls);
    const hStatus = hCls.status === '已毕业' ? '已结课' : '历史班级';
    html += '<div class="card">' +
      '<div class="card-title">' + hCls.name + ' 班级进度（' + hStatus + '）</div>' +
      '<div class="progress-section">' +
        '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + hProg.pct + '%"></div></div>' +
        '<div class="progress-text"><span>已上 ' + hProg.cumulative + ' 课时（' + hProg.pct + '%）</span><span>共 ' + hProg.total + ' 课时</span></div>' +
      '</div>' +
    '</div>';
  });

  if (classTotal > 0) {
    html += '<div class="card">' +
      '<div class="card-title">' + (clsName ? clsName.split('(')[0] + ' ' : '') + '班级进度</div>' +
      '<div class="progress-section">' +
        '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + progressPct + '%"></div></div>' +
        '<div class="progress-text"><span>已上 ' + classCumulative + ' 课时（' + progressPct + '%）</span><span>共 ' + classTotal + ' 课时</span></div>' +
      '</div>' +
    '</div>';
  }

  if (monthRowsHtml) {
    html += '<div class="card">' +
      '<div class="card-title">月度出勤明细</div>' +
      '<table class="month-table">' +
        '<tr><th>月份</th><th style="text-align:right">课时</th></tr>' +
        monthRowsHtml +
      '</table>' +
    '</div>';
  }

  html += '<div style="text-align:center;padding:10px 0 30px">' +
    '<a class="back-btn" onclick="showSearch()">返回查询</a>' +
    '<a class="refresh-btn" onclick="refreshData(' + studentId + ')">刷新数据</a>' +
  '</div>';

  document.getElementById('app').innerHTML = html;
}

init();
</script>
</body>
</html>
