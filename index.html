<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK·邻里 教务系统（云同步版）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;min-height:100vh}
.nav{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:12px 28px;display:flex;gap:24px;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.nav h1{font-size:18px;font-weight:700;white-space:nowrap}
.nav .tabs{display:flex;gap:4px;flex-wrap:wrap}
.nav .tabs button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;transition:.2s;white-space:nowrap}
.nav .tabs button:hover,.nav .tabs button.active{background:rgba(255,255,255,.25);border-color:#fff}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin:16px 24px;padding:20px 24px}
.card h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input[type=number]{padding:7px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;background:#fff}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-weight:600;transition:.15s;white-space:nowrap}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-gray{background:#e2e8f0;color:#475569}.btn-gray:hover{background:#cbd5e1}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-xs{padding:2px 8px;font-size:10px;border-radius:4px}
.tbl{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{background:#f8fafc;padding:10px 8px;font-size:12px;color:#475569;font-weight:600;text-align:center;border-bottom:2px solid #e2e8f0;white-space:nowrap;position:sticky;top:0}
tbody td{padding:8px 8px;font-size:13px;text-align:center;border-bottom:1px solid #f1f5f9}
tbody tr:hover{background:#f8fafc}
.tag{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600}
.tag-k1{background:#dbeafe;color:#1e40af}.tag-k2{background:#d1fae5;color:#065f46}.tag-s{background:#ede9fe;color:#5b21b6}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px}
.modal .form-group{margin-bottom:14px}
.modal .form-group label{display:block;font-size:13px;color:#475569;font-weight:600;margin-bottom:5px}
.modal .form-group input,.modal .form-group select{width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
.modal .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.att-form{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.att-table-wrap{max-height:60vh;overflow-y:auto}
.att-table-wrap td input{width:50px;padding:4px 4px;border:1px solid #cbd5e1;border-radius:6px;text-align:center;font-size:12px}
.att-table-wrap .att-total{font-weight:700;color:#2563eb;background:#f0f7ff}
.att-month-hd{background:#f1f5f9;font-size:11px;color:#64748b}
.att-table-wrap td input.changed{background:#fef3c7;border-color:#f59e0b}
.stu-att-input{width:42px;padding:3px 2px;border:1px solid #cbd5e1;border-radius:5px;text-align:center;font-size:11px}
.stu-att-input:focus{outline:none;border-color:#2563eb;background:#f0f7ff}
.stu-att-input.changed{background:#fef3c7;border-color:#f59e0b}
.pbar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;width:60px;display:inline-block;vertical-align:middle;margin-top:3px}
.pfill{height:100%;border-radius:3px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;z-index:300;opacity:0;transform:translateX(20px);transition:.3s;max-width:400px}
.toast.show{opacity:1;transform:translateX(0)}
.toast-ok{background:#10b981}.toast-err{background:#ef4444}
.section{display:none}.section.active{display:block}
.row-warn{background:#fff7ed !important}.row-warn td{color:#c2410c}
.badge-warn{font-size:9px;background:#f97316;color:#fff;padding:1px 6px;border-radius:10px;margin-left:4px}
.row-grad{background:#f1f5f9 !important;opacity:0.6}.row-grad td{color:#94a3b8}
.grad-tag{font-size:9px;background:#94a3b8;color:#fff;padding:1px 6px;border-radius:10px;margin-left:4px}
tr[draggable="true"]{cursor:grab}tr[draggable="true"]:active{cursor:grabbing}tr[draggable="true"]:hover{background:#f0f9ff!important}
tr.dragging{opacity:0.4;background:#dbeafe!important}
tr.drag-over-top td{box-shadow:inset 0 3px 0 0 #3b82f6}
tr.drag-over-bottom td{box-shadow:inset 0 -3px 0 0 #3b82f6}
.drag-hint{color:#cbd5e1;font-size:10px;user-select:none}tr:hover .drag-hint{color:#94a3b8}
.status-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;user-select:none}
.status-toggle input{margin:0}
.sync-bar{background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:8px 28px;display:flex;align-items:center;gap:10px;font-size:12px;flex-wrap:wrap}
.sync-bar b{font-size:13px}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#1e3a5f;z-index:999;display:flex;justify-content:center;align-items:center;flex-direction:column}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:90%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-size:22px;color:#1e3a5f;margin-bottom:6px}
.login-box .sub{font-size:13px;color:#94a3b8;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;text-align:center;outline:none;transition:.2s}
.login-box input:focus{border-color:#2563eb}
.login-box .err-msg{color:#ef4444;font-size:12px;margin-top:8px;display:none}
.login-box .btn-login{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;transition:.2s}
.login-box .btn-login:hover{background:#1d4ed8}
.summary-bar{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.summary-item{flex:1;min-width:130px;background:#f8fafc;border-radius:10px;padding:14px 18px;text-align:center;border:1px solid #e2e8f0}
.summary-item .num{font-size:28px;font-weight:800;line-height:1.2}
.summary-item .lbl{font-size:11px;color:#64748b;margin-top:2px}
.summary-item .sub{font-size:11px;color:#94a3b8;margin-top:1px}
.sc-active .num{color:#2563eb}.sc-opened .num{color:#10b981}.sc-notopened .num{color:#94a3b8}.sc-grad .num{color:#8b5cf6}

/* ═══ 课程表预览 ═══ */
.sch-grid{border-collapse:collapse;width:100%;table-layout:fixed}
.sch-grid th,.sch-grid td{border:1px solid #e2e8f0;padding:0;vertical-align:top}
.sch-grid thead th{background:#f8fafc;padding:3px 2px;font-size:10px;color:#475569;font-weight:600;text-align:center;position:sticky;top:0;z-index:2}
.sch-grid thead th.day-hd{font-size:11px;background:#f1f5f9;color:#1e293b}
.sch-cell{position:relative;padding:0!important;height:20px}
.sch-block{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1px 3px;border-radius:4px;font-size:9.5px;font-weight:600;cursor:pointer;transition:.15s;line-height:1.2;white-space:nowrap;height:100%;box-sizing:border-box;margin:0 1px}
.sch-block:hover{transform:scale(1.02);box-shadow:0 2px 10px rgba(0,0,0,.18);z-index:10}
.sch-opened{background:linear-gradient(135deg,#bbf7d0,#86efac);color:#166534;border:1px solid #4ade80}
.sch-notopened{background:#f1f5f9;color:#94a3b8;border:1px solid #cbd5e1}
.sch-time{font-size:8px;opacity:.75;font-weight:400;margin-top:0}
.sch-block{position:relative} /* 为 tooltip 提供定位上下文 */
.sch-tip{display:none;position:absolute;z-index:9999;top:100%;left:50%;transform:translateX(-50%);margin-top:6px;min-width:220px;background:#1e293b;color:#e2e8f0;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.6;box-shadow:0 8px 30px rgba(0,0,0,.4);pointer-events:auto}
.sch-block:hover .sch-tip{display:block}
.sch-tip h4{color:#fff;margin-bottom:6px;font-size:13px;border-bottom:1px solid #475569;padding-bottom:4px}
.sch-tip-row{display:flex;justify-content:space-between;padding:2px 0}
.sch-tip-lbl{color:#94a3b8}
.sch-tip-val{color:#fff;font-weight:600}
.sch-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:11px}
.sch-legend span{display:inline-flex;align-items:center;gap:4px}
.sch-dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.sch-week-nav{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sch-week-nav b{font-size:15px}
.sch-week-nav button{padding:4px 10px;border-radius:6px;border:1px solid #cbd5e1;background:#fff;font-size:12px;cursor:pointer}
.sch-week-nav button:hover{background:#f1f5f9}
/* 时间行标签 */
.sch-time-label{padding:1px 3px!important;font-size:9px;color:#64748b;font-weight:600;text-align:right!important;white-space:nowrap;background:#fafafa;border-right:2px solid #e2e8f0;vertical-align:middle;width:40px}
.sch-time-row td{border-top:1px dashed #e2e8f0}
</style>
</head>
<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 DK·邻里 教务系统</h2>
    <div class="sub">请输入密码以访问系统</div>
    <input type="password" id="loginPwd" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()" autofocus>
    <div class="err-msg" id="loginErr">密码错误，请重试</div>
    <button class="btn-login" onclick="doLogin()">登 录</button>
    <div id="globalErr" style="display:none;margin-top:12px;padding:10px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;font-size:12px"></div>
  </div>
</div>

<!-- 主内容（登录后显示） -->
<div id="app" style="display:none">

<div class="toast" id="toast"></div>

<!-- 同步状态栏 -->
<div class="sync-bar">
  <span>☁️ <b>云同步</b> — 所有修改实时保存到云端</span>
  <span style="margin-left:auto;font-size:11px;opacity:0.8" id="syncStatus">连接中...</span>
</div>

<!-- 导航 -->
<div class="nav">
  <h1>DK·邻里 教务系统</h1>
  <div class="tabs">
    <button class="active" onclick="switchTab('classes')">班级管理</button>
    <button onclick="switchTab('students')">学员出勤</button>
    <button onclick="switchTab('stats')">班级排课</button>
    <button onclick="switchTab('schedule')">课程表预览</button>
  </div>
</div>

<!-- Tab 1: 班级管理 -->
<div class="section active" id="sec-classes">
  <div class="card">
    <h2>班级列表 <button class="btn btn-primary btn-sm" onclick="openClassModal()">＋ 新增班级</button>
      <button class="btn btn-gray btn-sm" onclick="exportTab('classes')" style="margin-left:auto">📥 导出</button></h2>
    <div class="summary-bar" id="classSummary"></div>
    <div class="tbl"><table>
      <thead><tr>
        <th style="text-align:left;width:140px">班级名称</th><th style="width:60px">阶段</th><th style="width:70px">带班老师</th>
        <th style="width:80px">排课频率</th><th style="width:80px">阶段总课时</th>
        <th style="width:80px">年前已上</th><th style="width:100px">学员数</th>
        <th style="width:120px">操作</th>
      </tr></thead>
      <tbody id="classTbody"></tbody>
    </table></div>
  </div>
</div>

<!-- Tab 2: 学员出勤（融合课时登记） -->
<div class="section" id="sec-students">
  <div class="card">
    <h2>学员列表
      <select id="stuClassFilter" onchange="renderStudents()" style="margin-left:12px;padding:6px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px">
        <option value="all">全部班级</option>
      </select>
      <label class="status-toggle" style="margin-left:12px;font-size:13px">
        <input type="checkbox" id="showGraduated" onchange="renderStudents()"> 显示毕业学员
      </label>
      <span id="stuAttControls" style="display:none;margin-left:8px;gap:6px;align-items:center">
        <label style="font-size:12px;margin-left:4px">年：<input type="number" id="stuYearFilter" value="2026" min="2020" max="2030" style="width:60px;padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px" onchange="renderStudents()"></label>
        <button class="btn btn-success btn-sm" onclick="markStuAllPresent()">一键全勤</button>
        <button class="btn btn-primary btn-sm" onclick="saveStuAttendance()">保存登记</button>
      </span>
      <button class="btn btn-primary btn-sm" onclick="openStudentModal()" style="margin-left:auto">＋ 新增学员</button>
      <button class="btn btn-gray btn-sm" onclick="exportTab('students')">📥 导出</button>
    </h2>
    <div class="tbl att-table-wrap"><table>
      <thead id="stuThead"><tr>
        <th style="width:50px">拖拽</th><th style="text-align:left;width:100px">姓名</th><th style="width:120px">班级</th>
        <th style="width:80px">合计</th><th style="width:90px">缴费课时</th><th style="width:90px">剩余课时</th>
        <th style="width:130px">操作</th>
      </tr></thead>
      <tbody id="stuTbody"></tbody>
    </table></div>
  </div>
</div>

<!-- Tab 4: 班级排课 -->
<div class="section" id="sec-stats">
  <div class="card">
    <h2>班级排课进度 <button class="btn btn-success btn-sm" onclick="saveClassProgress()">保存修改</button>
      <button class="btn btn-gray btn-sm" onclick="renderClassProgress()">重置</button>
      <button class="btn btn-gray btn-sm" onclick="exportTab('stats')" style="margin-left:auto">📥 导出</button></h2>
    <div class="tbl"><table><thead><tr>
      <th style="text-align:left">班级</th><th>年前已上</th><th>3月排课</th><th>4月排课</th><th>5月排课</th><th>6月排课</th>
      <th>累计已上</th><th>阶段总课时</th><th>进度</th><th>状态</th>
    </tr></thead><tbody id="statsTbody"></tbody></table></div>
  </div>
</div>

<!-- Tab 4: 课程表预览 -->
<div class="section" id="sec-schedule">
  <div class="card">
    <h2>课程表一览
      <button class="btn btn-primary btn-sm" onclick="openSchEditor()" style="margin-left:auto;margin-right:8px">✏️ 编辑排课</button>
      <button class="btn btn-gray btn-sm" onclick="exportSchedule()">📥 导出</button></h2>
    <div class="sch-week-nav">
      <button onclick="schWeekOffset(-1)">◀ 上周</button>
      <b id="schWeekRange"></b>
      <button onclick="schWeekOffset(1)">下周 ▶</button>
      <button onclick="schWeekOffset(0)" style="margin-left:6px;font-size:10px">今天</button>
    </div>
    <div class="sch-legend">
      <span><i class="sch-dot" style="background:#86efac;border:1px solid #4ade80"></i> 已开课</span>
      <span><i class="sch-dot" style="background:#f1f5f9;border:1px solid #cbd5e1;color:#94a3b8"></i> 未开课</span>
    </div>
    <div style="overflow-x:auto"><table class="sch-grid" id="schTable"></table></div>
  </div>
</div>

<!-- 弹窗：编辑排课 -->
<div class="modal-overlay" id="schEditorModal">
  <div class="modal" style="max-width:800px;max-height:85vh;overflow-y:auto">
    <h3>📅 编辑排课时间</h3>
    <p style="font-size:12px;color:#64748b;margin-bottom:14px">修改每个班级的上课时间和老师，保存后立即生效。</p>
    <div id="schEditorBody" style="display:flex;flex-direction:column;gap:16px"></div>
    <div class="form-actions" style="margin-top:16px"><button class="btn btn-gray" onclick="closeSchEditor()">取消</button><button class="btn btn-primary" onclick="saveSchEditor()">💾 保存排课</button></div>
  </div>
</div>

<!-- 弹窗：班级 -->
<div class="modal-overlay" id="classModal">
  <div class="modal">
    <h3 id="classModalTitle">新增班级</h3>
    <input type="hidden" id="classEditId">
    <div class="form-group"><label>班级名称</label><input id="className" placeholder="如 K1005(三六)"></div>
    <div class="form-group"><label>阶段</label><select id="classPhase"><option value="K1">K1</option><option value="K2">K2</option><option value="S">S</option></select></div>
    <div class="form-group"><label>排课频率（节/月）</label><input type="number" id="classFreq" value="8" min="1"></div>
    <div class="form-group"><label>阶段总课时</label><input type="number" id="classTotal" value="88" min="1"></div>
    <div class="form-group"><label>年前已上课时</label><input type="number" id="classBefore" value="0" min="0"></div>
    <hr style="margin:14px 0;border:none;border-top:1px dashed #e2e8f0">
    <div style="font-size:12px;color:#64748b;font-weight:600;margin-bottom:8px">📅 排课设置（用于课程表预览）</div>
    <div class="form-group"><label>带班老师</label><select id="classTeacher"><option value="Dora">Dora</option><option value="Cindy">Cindy</option></select></div>
    <div class="form-group"><label>开课日期（留空=未开课）</label><input type="date" id="classOpenDate"></div>
    <div class="form-group"><label>班级容量</label><input type="number" id="classCapacity" value="8" min="1"></div>
    <div id="schSessionList" style="margin-bottom:8px"></div>
    <button type="button" class="btn btn-gray btn-sm" onclick="addSchSessionRow()" style="font-size:11px">+ 添加上课时间</button>
    <div class="form-actions" style="margin-top:16px"><button class="btn btn-gray" onclick="closeClassModal()">取消</button><button class="btn btn-primary" onclick="saveClass()">保存</button></div>
  </div>
</div>

<!-- 弹窗：学员 -->
<div class="modal-overlay" id="stuModal">
  <div class="modal">
    <h3 id="stuModalTitle">新增学员</h3>
    <input type="hidden" id="stuEditId">
    <div class="form-group"><label>学员姓名</label><input id="stuName" placeholder="学员全名"></div>
    <div class="form-group"><label>所属班级</label><select id="stuClass"></select></div>
    <div class="form-group"><label>缴费课时数</label><input type="number" id="stuPaid" value="0" min="0"></div>
    <div class="form-group"><label>学员状态</label><select id="stuStatus"><option value="在读">在读</option><option value="毕业">毕业</option></select></div>
    <div class="form-actions"><button class="btn btn-gray" onclick="closeStudentModal()">取消</button><button class="btn btn-primary" onclick="saveStudent()">保存</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

let sb = null;
try {
  if (window.supabase && window.supabase.createClient) {
    sb = window.supabase.createClient(SB_URL, SB_KEY);
  } else {
    throw new Error('Supabase SDK 未加载（CDN 可能被阻断）');
  }
} catch(e) {
  console.error('Supabase 初始化失败:', e.message);
}

// 数据缓存
let _classes = [], _students = [], _attendance = [];

async function syncStatus(msg) {
  document.getElementById('syncStatus').textContent = msg;
}

async function loadAll() {
  if (!sb) {
    syncStatus('⚠️ 云数据库未连接');
    showToast('云数据库连接失败，请检查网络后刷新页面', false);
    return;
  }
  syncStatus('加载中...');
  const [cr, sr, ar] = await Promise.all([
    sb.from('classes').select('*').order('id'),
    sb.from('students').select('*').order('sort_order'),
    sb.from('attendance').select('*')
  ]);
  if (cr.error) { showToast('加载班级失败: '+cr.error.message, false); return; }
  if (sr.error) { showToast('加载学员失败: '+sr.error.message, false); return; }
  if (ar.error) { showToast('加载课时失败: '+ar.error.message, false); return; }
  _classes = cr.data; _students = sr.data; _attendance = ar.data;
  syncStatus('已同步 ' + _students.length + ' 名学员');
  initApp();
}

// 工具
// ═══════════════════════════════════════
function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err') + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}

function calcRemaining(sid) {
  const s = _students.find(x => x.id === sid);
  if (!s) return 0;
  const paid = s.paid_hours || 0;
  const consumed = _attendance.filter(a => a.student_id === sid).reduce((sum, a) => sum + (a.hours || 0), 0);
  return Math.max(0, Math.round((paid - consumed) * 10) / 10);
}

function getClassName(cid) {
  const c = _classes.find(x => x.id === cid);
  return c ? c.name : '未知班级';
}

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  const map = {classes:'sec-classes',students:'sec-students',stats:'sec-stats',schedule:'sec-schedule'};
  const idx = {classes:0,students:1,stats:2,schedule:3};
  document.getElementById(map[tab]).classList.add('active');
  document.querySelectorAll('.tabs button')[idx[tab]].classList.add('active');
  if (tab==='classes') renderClasses();
  if (tab==='students') { fillStuClassFilter(); renderStudents(); }
  if (tab==='stats') renderClassProgress();
  if (tab==='schedule') renderSchedule();
}

// Tab 1: 班级管理

function renderClasses() {
  // 修复: 只统计在读学员，排除已毕业
  const countMap = {};
  _students.filter(s => s.status !== '毕业').forEach(s => { countMap[s.class_id] = (countMap[s.class_id]||0) + 1; });

  // ── 统计汇总 ──
  const activeStu = _students.filter(s => s.status !== '毕业');
  const gradStu = _students.filter(s => s.status === '毕业');
  // 已开课 = 在读 + 班级累计排课 > 0
  const openedCount = activeStu.filter(s => {
    const cls = _classes.find(c => c.id === s.class_id);
    if (!cls) return false;
    return ((cls.m3||0) + (cls.m4||0) + (cls.m5||0) + (cls.m6||0)) > 0;
  }).length;
  const notOpenedCount = activeStu.length - openedCount;
  document.getElementById('classSummary').innerHTML =
    '<div class="summary-item sc-active"><div class="num">' + activeStu.length + '</div><div class="lbl">在读学员</div></div>' +
    '<div class="summary-item sc-opened"><div class="num">' + openedCount + '</div><div class="lbl">已开课</div><div class="sub">累计排课 &gt; 0</div></div>' +
    '<div class="summary-item sc-notopened"><div class="num">' + notOpenedCount + '</div><div class="lbl">未开课</div><div class="sub">累计排课 = 0</div></div>' +
    '<div class="summary-item sc-grad"><div class="num">' + gradStu.length + '</div><div class="lbl">已毕业</div></div>';

  let html = '';
  _classes.forEach(c => {
    const phase = c.phase || '';
    const sch = SCHEDULE_DATA.find(s => s.classId === c.id);
    const teacher = sch ? (sch.teacher||'—') : '—';
    html += '<tr>' +
      '<td style="text-align:left;font-weight:600">' + c.name + ' <span class="tag tag-' + (phase||'k1').toLowerCase() + '">' + phase + '阶段</span></td>' +
      '<td>' + phase + '</td>' +
      '<td><b>' + teacher + '</b></td>' +
      '<td>' + (c.freq||0) + ' 节/月</td>' +
      '<td><b>' + (c.total_hours||0) + '</b></td>' +
      '<td>' + (c.before_hours||0) + '</td>' +
      '<td>' + (countMap[c.id]||0) + ' 人</td>' +
      '<td><button class="btn btn-gray btn-xs" onclick="editClass(' + c.id + ')">✏️</button> ' +
      '<button class="btn btn-danger btn-xs" onclick="deleteClass(' + c.id + ')">🗑</button></td></tr>';
  });
  document.getElementById('classTbody').innerHTML = html || '<tr><td colspan="8" style="color:#94a3b8;padding:30px">暂无班级</td></tr>';
}

function openClassModal(cid) {
  document.getElementById('classEditId').value = cid || '';
  document.getElementById('classModalTitle').textContent = cid ? '编辑班级' : '新增班级';
  // 清空排课时段列表
  document.getElementById('schSessionList').innerHTML = '';
  if (cid) {
    const c = _classes.find(x => x.id === cid);
    if (c) {
      document.getElementById('className').value = c.name;
      document.getElementById('classPhase').value = c.phase || 'K1';
      document.getElementById('classFreq').value = c.freq || 0;
      document.getElementById('classTotal').value = c.total_hours || 0;
      document.getElementById('classBefore').value = c.before_hours || 0;
    }
    // 如果已有排课数据，回填
    const sch = SCHEDULE_DATA.find(s => s.classId === cid);
    if (sch) {
      document.getElementById('classTeacher').value = sch.teacher || 'Dora';
      document.getElementById('classOpenDate').value = sch.openDate || '';
      document.getElementById('classCapacity').value = sch.capacity || 8;
      (sch.sessions||[]).forEach(s => addSchSessionRow(s.day, s.start, s.end));
    } else {
      document.getElementById('classTeacher').value = 'Dora';
      document.getElementById('classOpenDate').value = '';
      document.getElementById('classCapacity').value = 8;
      addSchSessionRow();
    }
  } else {
    document.getElementById('className').value = '';
    document.getElementById('classPhase').value = 'K1';
    document.getElementById('classFreq').value = 8;
    document.getElementById('classTotal').value = 88;
    document.getElementById('classBefore').value = 0;
    document.getElementById('classTeacher').value = 'Dora';
    document.getElementById('classOpenDate').value = '';
    document.getElementById('classCapacity').value = 8;
    // 新增班级默认添加一行时段
    addSchSessionRow();
  }
  document.getElementById('classModal').classList.add('show');
}

// 添加一行上课时段输入
let _sessionRowIdx = 0;
function addSchSessionRow(day, start, end) {
  const container = document.getElementById('schSessionList');
  const idx = _sessionRowIdx++;
  const dayOpts = ['周一','周二','周三','周四','周五','周六','周日'].map((n,i) =>
    '<option value="' + i + '"' + (day===i?' selected':'') + '>' + n + '</option>'
  ).join('');
  const div = document.createElement('div');
  div.id = 'schRow_' + idx;
  div.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:6px';
  div.innerHTML =
    '<select id="schDay_' + idx + '" style="flex:1;padding:5px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px">' +
      '<option value="">星期</option>' + dayOpts + '</select>' +
    '<input type="time" id="schStart_' + idx + '" value="' + (start||'') + '" placeholder="开始" style="flex:1;padding:5px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px">' +
    '<input type="time" id="schEnd_' + idx + '" value="' + (end||'') + '" placeholder="结束" style="flex:1;padding:5px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px">' +
    '<button type="button" onclick="this.parentElement.remove()" style="padding:4px 8px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:6px;cursor:pointer;font-size:11px">×</button>';
  container.appendChild(div);
}

// 从表单读取时段数据
function getSchSessions() {
  const sessions = [];
  const rows = document.querySelectorAll('#schSessionList > div');
  rows.forEach(row => {
    const id = row.id.replace('schRow_','');
    const day = parseInt(document.getElementById('schDay_' + id).value);
    const start = document.getElementById('schStart_' + id).value;
    const end = document.getElementById('schEnd_' + id).value;
    if (!isNaN(day) && start && end) {
      sessions.push({ day, start, period: start < '12' ? 'am' : (start < '18' ? 'pm' : 'eve'), end });
    }
  });
  return sessions;
}

function closeClassModal() { document.getElementById('classModal').classList.remove('show'); }

async function saveClass() {
  const name = document.getElementById('className').value.trim();
  if (!name) { showToast('请输入班级名称', false); return; }
  const data = {
    name: name,
    phase: document.getElementById('classPhase').value,
    freq: parseFloat(document.getElementById('classFreq').value) || 0,
    total_hours: parseFloat(document.getElementById('classTotal').value) || 0,
    before_hours: parseFloat(document.getElementById('classBefore').value) || 0
  };
  // 排课数据
  const schData = {
    teacher: document.getElementById('classTeacher').value,
    openDate: document.getElementById('classOpenDate').value,
    capacity: parseInt(document.getElementById('classCapacity').value) || 8,
    sessions: getSchSessions()
  };
  const editId = document.getElementById('classEditId').value;
  if (editId) {
    const { error } = await sb.from('classes').update(data).eq('id', parseInt(editId));
    if (error) { showToast('更新失败: '+error.message, false); return; }
    // 更新排课数据
    const schIdx = SCHEDULE_DATA.findIndex(s => s.classId === parseInt(editId));
    if (schIdx >= 0) {
      Object.assign(SCHEDULE_DATA[schIdx], {
        teacher: schData.teacher, openDate: schData.openDate,
        capacity: schData.capacity, sessions: schData.sessions,
        statusOverride: schData.openDate ? undefined : '未开课'
      });
      try { localStorage.setItem('edusys_schedule', JSON.stringify(SCHEDULE_DATA)); localStorage.setItem('edusys_schedule_ver', String(SCHEDULE_VERSION)); } catch(e){}
    }
    showToast('班级已更新');
  } else {
    const maxId = _classes.reduce((m, c) => Math.max(m, c.id), 0);
    data.id = maxId + 1;
    const newId = data.id;
    const { error } = await sb.from('classes').insert(data);
    if (error) { showToast('新增失败: '+error.message, false); return; }
    // 自动加入排课表
    const phase = data.phase;
    SCHEDULE_DATA.push({
      classId: newId, name: name, phase: phase,
      teacher: schData.teacher,
      sessions: schData.sessions,
      openDate: schData.openDate,
      capacity: schData.capacity,
      statusOverride: schData.openDate ? undefined : '未开课'
    });
    try { localStorage.setItem('edusys_schedule', JSON.stringify(SCHEDULE_DATA)); } catch(e){}
    showToast('班级已新增（已自动加入课程表）');
  }
  closeClassModal();
  await loadAll();
  renderClasses();
}

async function editClass(cid) {
  openClassModal(cid);
}

async function deleteClass(cid) {
  const name = getClassName(cid);
  const studentCount = _students.filter(s => s.class_id === cid).length;
  let msg = '确定删除班级 "' + name + '"？';
  if (studentCount > 0) {
    msg += '\n\n⚠️ 该班级下有 ' + studentCount + ' 名学员。';
    msg += '\n学员与课时记录将保留（学员变为「无班级」）。';
  }
  if (!confirm(msg)) return;
  // 先解除学员关联，避免外键冲突
  await sb.from('students').update({class_id: null}).eq('class_id', cid);
  const { error } = await sb.from('classes').delete().eq('id', cid);
  if (error) { showToast('删除失败: '+error.message, false); return; }
  showToast('班级已删除');
  await loadAll();
  renderClasses();
}

function fillStuClassFilter() {
  const sel = document.getElementById('stuClassFilter');
  sel.innerHTML = '<option value="all">全部班级</option>';
  _classes.forEach(c => { sel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
}

async function renderStudents() {
  const filterId = document.getElementById('stuClassFilter').value;
  const showGrad = document.getElementById('showGraduated').checked;
  const year = parseInt(document.getElementById('stuYearFilter')?.value || '2026');
  const isDetailMode = filterId !== 'all';
  const classMap = {};
  _classes.forEach(c => { classMap[c.id] = c.name; });
  
  // 控制年度选择器和出勤按钮的显示
  const attControls = document.getElementById('stuAttControls');
  if (attControls) attControls.style.display = isDetailMode ? 'inline-flex' : 'none';
  
  // 筛选学员
  let list = _students.filter(s => showGrad || s.status !== '毕业');
  if (isDetailMode) list = list.filter(s => s.class_id === parseInt(filterId));
  
  if (!isDetailMode) {
    // ═══════════ 全部班级：简洁汇总视图 ═══════════
    const groups = {};
    list.forEach(s => {
      const cid = s.class_id || 0;
      if (!groups[cid]) groups[cid] = [];
      groups[cid].push(s);
    });
    
    let html = '';
    const orderedCids = Object.keys(groups).sort((a,b) => {
      const ca = _classes.find(x => x.id === parseInt(a));
      const cb = _classes.find(x => x.id === parseInt(b));
      return (ca?.id||0) - (cb?.id||0);
    });
    
    document.getElementById('stuThead').innerHTML = '<tr>' +
      '<th style="width:50px">拖拽</th><th style="text-align:left;width:100px">姓名</th><th style="width:120px">班级</th>' +
      '<th style="width:80px">合计</th><th style="width:90px">缴费课时</th><th style="width:90px">剩余课时</th>' +
      '<th style="width:130px">操作</th></tr>';
    
    orderedCids.forEach(cid => {
      const cname = classMap[parseInt(cid)] || '无班级';
      html += '<tr class="cls-header"><td colspan="7" style="text-align:left;padding:10px 8px"><b>' + cname + '</b></td></tr>';
      groups[cid].sort((a,b) => (a.sort_order||0) - (b.sort_order||0)).forEach(s => {
        const rem = calcRemaining(s.id);
        const consumed = (s.paid_hours||0) - rem;
        const isGrad = s.status === '毕业';
        const isWarn = !isGrad && rem < 15 && rem > 0;
        const rowClass = isGrad ? 'row-grad' : (isWarn ? 'row-warn' : '');
        html += '<tr class="' + rowClass + '" draggable="true" ' +
          'ondragstart="dragStart(event,' + s.id + ')" ' +
          'ondragover="dragOver(event,' + s.id + ',this)" ' +
          'ondragleave="dragLeave(event,this)" ' +
          'ondrop="dropStudent(event,' + s.id + ')" ' +
          'data-sid="' + s.id + '">' +
          '<td><span class="drag-hint">⋮⋮</span></td>' +
          '<td style="text-align:left;font-weight:600">' + s.name +
            (isGrad ? '<span class="grad-tag">毕业</span>' : '') +
            (isWarn ? '<span class="badge-warn">续费</span>' : '') + '</td>' +
          '<td>' + cname + '</td>' +
          '<td>' + consumed.toFixed(1) + '</td>' +
          '<td>' + (s.paid_hours||0) + '</td>' +
          '<td><b style="color:' + (rem < 15 ? '#f97316' : '#2563eb') + '">' + rem + '</b></td>' +
          '<td>' +
            '<label class="status-toggle" onclick="toggleStatus(' + s.id + ')" title="切换在读/毕业">' +
            '<input type="checkbox" ' + (isGrad ? '' : 'checked') + '>' +
            '<span>' + (isGrad ? '已毕业' : '在读') + '</span>' +
            '</label> ' +
            '<button class="btn btn-gray btn-xs" onclick="editStudent(' + s.id + ')">✏️</button> ' +
            '<button class="btn btn-danger btn-xs" onclick="deleteStudent(' + s.id + ')">🗑</button>' +
          '</td></tr>';
      });
    });
    document.getElementById('stuTbody').innerHTML = html || '<tr><td colspan="7" style="color:#94a3b8;padding:30px">暂无学员</td></tr>';
  } else {
    // ═══════════ 具体班级：展开月度课时视图 ═══════════
    const cid = parseInt(filterId);
    const cls = _classes.find(c => c.id === cid);
    const freq = cls?.freq || 8;
    const cname = classMap[cid] || '未知班级';
    const totalCols = 18;
    
    // 表头：拖拽 | 姓名 | 1~12月 | 年合计 | 累计已消 | 缴费 | 剩余 | 操作
    let theadHtml = '<tr>' +
      '<th style="width:28px">⋮</th>' +
      '<th style="text-align:left;width:70px">姓名</th>';
    for (let m = 1; m <= 12; m++) {
      const isTeaching = m >= 3 && m <= 6;
      theadHtml += '<th class="att-month-hd"' + (isTeaching ? ' style="background:#e0f0ff;color:#2563eb"' : '') + '>' + m + '月</th>';
    }
    theadHtml += '<th style="width:44px;color:#2563eb;font-weight:700">合计</th>' +
      '<th style="width:52px">累计已消</th>' +
      '<th style="width:48px">缴费</th>' +
      '<th style="width:48px">剩余</th>' +
      '<th style="width:75px">操作</th></tr>';
    document.getElementById('stuThead').innerHTML = theadHtml;
    
    // 表体
    let html = '<tr class="cls-header"><td colspan="' + totalCols + '" style="text-align:left;padding:10px 8px"><b>' + cname + '</b> · ' + list.length + ' 名学员 · 排课 ' + freq + ' 节/月</td></tr>';
    
    list.sort((a,b) => (a.sort_order||0) - (b.sort_order||0)).forEach(s => {
      const rem = calcRemaining(s.id);
      const consumed = (s.paid_hours||0) - rem;
      const isGrad = s.status === '毕业';
      const isWarn = !isGrad && rem < 15 && rem > 0;
      const rowClass = isGrad ? 'row-grad' : (isWarn ? 'row-warn' : '');
      
      html += '<tr class="' + rowClass + '" data-sid="' + s.id + '" draggable="true" ' +
        'ondragstart="dragStart(event,' + s.id + ')" ' +
        'ondragover="dragOver(event,' + s.id + ',this)" ' +
        'ondragleave="dragLeave(event,this)" ' +
        'ondrop="dropStudent(event,' + s.id + ')" ' +
        'data-sid="' + s.id + '">' +
        '<td><span class="drag-hint">⋮⋮</span></td>' +
        '<td style="text-align:left;font-weight:600">' + s.name +
          (isGrad ? '<span class="grad-tag">毕业</span>' : '') +
          (isWarn ? '<span class="badge-warn">续费</span>' : '') + '</td>';
      
      let rowYearTotal = 0;
      for (let m = 1; m <= 12; m++) {
        const rec = _attendance.find(a => a.student_id === s.id && a.year === year && a.month === m);
        const hours = rec ? (rec.hours || 0) : 0;
        rowYearTotal += hours;
        const isTeaching = m >= 3 && m <= 6;
        html += '<td><input type="number" step="0.5" min="0" value="' + hours + 
          '" data-sid="' + s.id + '" data-month="' + m + '" class="stu-att-input"' +
          (isTeaching ? '' : ' style="color:#94a3b8"') + 
          ' oninput="updateStuRowTotals()"></td>';
      }
      html += '<td class="att-total">' + rowYearTotal.toFixed(1) + '</td>' +
        '<td>' + consumed.toFixed(1) + '</td>' +
        '<td>' + (s.paid_hours||0) + '</td>' +
        '<td><b style="color:' + (rem < 15 ? '#f97316' : '#2563eb') + '">' + rem + '</b></td>' +
        '<td>' +
          '<label class="status-toggle" onclick="toggleStatus(' + s.id + ')" title="切换在读/毕业">' +
          '<input type="checkbox" ' + (isGrad ? '' : 'checked') + '>' +
          '<span style="font-size:10px">' + (isGrad ? '毕业' : '在读') + '</span>' +
          '</label> ' +
          '<button class="btn btn-gray btn-xs" onclick="editStudent(' + s.id + ')">✏️</button> ' +
          '<button class="btn btn-danger btn-xs" onclick="deleteStudent(' + s.id + ')">🗑</button>' +
        '</td></tr>';
    });
    document.getElementById('stuTbody').innerHTML = html || '<tr><td colspan="' + totalCols + '" style="color:#94a3b8;padding:30px">该班级暂无学员</td></tr>';
  }
}

async function toggleStatus(sid) {
  const s = _students.find(x => x.id === sid);
  if (!s) return;
  const newStatus = s.status === '毕业' ? '在读' : '毕业';
  const { error } = await sb.from('students').update({status: newStatus}).eq('id', sid);
  if (error) { showToast('更新失败', false); return; }
  await loadAll();
  renderStudents();
  showToast(s.name + ' → ' + newStatus);
}

function openStudentModal(sid) {
  document.getElementById('stuEditId').value = sid || '';
  document.getElementById('stuModalTitle').textContent = sid ? '编辑学员' : '新增学员';
  // Fill class dropdown
  const sel = document.getElementById('stuClass');
  sel.innerHTML = '';
  _classes.forEach(c => { sel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
  
  if (sid) {
    const s = _students.find(x => x.id === sid);
    if (s) {
      document.getElementById('stuName').value = s.name;
      document.getElementById('stuClass').value = s.class_id || '';
      document.getElementById('stuPaid').value = s.paid_hours || 0;
      document.getElementById('stuStatus').value = s.status || '在读';
    }
  } else {

// ── 拖拽排序 ──
let draggedSid = null;
function dragStart(event, sid) {
  draggedSid = sid;
  const row = event.currentTarget;
  setTimeout(() => row.classList.add('dragging'), 0);
}
function dragOver(event, sid, rowEl) {
  event.preventDefault();
  const rect = rowEl.getBoundingClientRect();
  const mid = (rect.top + rect.bottom) / 2;
  rowEl.classList.remove('drag-over-top', 'drag-over-bottom');
  rowEl.classList.add(event.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
}
function dragLeave(event, rowEl) {
  rowEl.classList.remove('drag-over-top', 'drag-over-bottom');
}
async function dropStudent(event, targetSid) {
  event.preventDefault();
  const row = event.currentTarget;
  row.classList.remove('drag-over-top', 'drag-over-bottom');
  if (!draggedSid || draggedSid === targetSid) return;
  
  const dragS = _students.find(x => x.id === draggedSid);
  const targetS = _students.find(x => x.id === targetSid);
  if (!dragS || !targetS) return;
  
  // Only allow drag within same class
  if (dragS.class_id !== targetS.class_id) {
    showToast('只能在同一班级内拖拽排序', false);
    return;
  }
  
  const sameClass = _students.filter(s => s.class_id === dragS.class_id).sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  const dragIdx = sameClass.findIndex(s => s.id === draggedSid);
  const targetIdx = sameClass.findIndex(s => s.id === targetSid);
  if (dragIdx < 0 || targetIdx < 0) return;
  
  sameClass.splice(dragIdx, 1);
  sameClass.splice(targetIdx, 0, dragS);
  
  // Batch update
  const updates = sameClass.map((s, i) => ({ id: s.id, sort_order: i }));
  for (const u of updates) {
    await sb.from('students').update({sort_order: u.sort_order}).eq('id', u.id);
  }
  
  await loadAll();
  renderStudents();
  showToast('排序已保存');
}

function renderClassProgress() {
  let html = '';
  const months = [3,4,5,6];
  const mkeys = ['m3','m4','m5','m6'];
  
  _classes.forEach(c => {
    const totalHours = c.total_hours || 0;
    const before = c.before_hours || 0;
    const monthlySum = months.reduce((s, m, i) => s + (c[mkeys[i]] || 0), 0);
    const cumulative = monthlySum;  // "累计已上" = 仅当年排课（不含年前已上）
    // 进度 = 累计已上 / 阶段总课时（本年度完成进度）
    const pct = totalHours > 0 ? Math.round(cumulative / totalHours * 100) : 0;
    
    // 状态分级
    // 未开课: 阶段总课时>0 且 累计已上=0 （当年从未排课/未开班）
    // 刚起步: 0% < 进度 < 25%
    // 进行中: 25% ≤ 进度 < 50%
    // 过半:   50% ≤ 进度 < 75%
    // 接近完成: 75% ≤ 进度 < 100%
    // 已完成: 进度 ≥ 100%
    // 未设置: 阶段总课时 = 0
    let barColor = '#94a3b8', statusText = '';
    if (totalHours === 0) { statusText = '未设置'; }
    else if (cumulative === 0) { barColor = '#94a3b8'; statusText = '未开课'; }
    else if (pct >= 100) { barColor = '#10b981'; statusText = '已完成'; }
    else if (pct >= 75) { barColor = '#8b5cf6'; statusText = '接近完成'; }
    else if (pct >= 50) { barColor = '#3b82f6'; statusText = '过半'; }
    else if (pct >= 25) { barColor = '#f59e0b'; statusText = '进行中'; }
    else { barColor = '#f97316'; statusText = '刚起步'; }
    
    html += '<tr>' +
      '<td style="text-align:left;font-weight:600">' + c.name + '</td>' +
      '<td><input type="number" value="' + before + '" data-cid="' + c.id + '" data-field="before_hours" style="width:60px;text-align:center"></td>' +
      months.map((m, i) => '<td><input type="number" value="' + (c[mkeys[i]]||0) + '" data-cid="' + c.id + '" data-field="' + mkeys[i] + '" style="width:60px;text-align:center"></td>').join('') +
      '<td><b>' + cumulative + '</b></td>' +
      '<td><b>' + totalHours + '</b></td>' +
      '<td><div style="display:flex;align-items:center;gap:6px;justify-content:center">' +
        '<div class="pbar"><div class="pfill" style="width:' + Math.min(100,pct) + '%;background:' + barColor + '"></div></div>' +
        '<span style="font-size:11px">' + pct + '%</span></div></td>' +
      '<td><span style="color:' + barColor + ';font-weight:600;font-size:12px">' + statusText + '</span></td>' +
      '</tr>';
  });
  document.getElementById('statsTbody').innerHTML = html;
}

function csvEscape(val) {
  const s = String(val == null ? '' : val);
  if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function exportCSV(headers, rows, filename) {
  const BOM = '\uFEFF';
  let csv = BOM + headers.map(csvEscape).join(',') + '\n';
  rows.forEach(row => {
    csv += row.map(csvEscape).join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出: ' + filename);
}

      rows.push([
        s.name,

        (s.paid_hours||0) + '',

function getSchWeekStart(offset) {
  const now = new Date();
  // 获取本周一
  const mon = new Date(now);
  mon.setDate(now.getDate() - (now.getDay() || 7) + 1);
  mon.setHours(0,0,0,0);
  mon.setDate(mon.getDate() + offset * 7);
  return mon;
}

function renderSchedule() {
  const ws = getSchWeekStart(_schWeekOffset);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  document.getElementById('schWeekRange').textContent =
    ws.getFullYear() + '-' + String(ws.getMonth()+1).padStart(2,'0') + '-' + String(ws.getDate()).padStart(2,'0')
    + ' ~ ' +
    we.getFullYear() + '-' + String(we.getMonth()+1).padStart(2,'0') + '-' + String(we.getDate()).padStart(2,'0');

  // 统计每个班级的学员数和状态
  const classStats = {};
  _classes.forEach(c => {
    const studs = _students.filter(s => s.class_id === c.id && s.status !== '毕业');
    const active = SCHEDULE_DATA.find(s => s.classId === c.id);
    const cap = active ? active.capacity : 8;
    classStats[c.id] = {
      count: studs.length,
      remaining: Math.max(0, cap - studs.length),
      isOpened: active ? (active.statusOverride !== '未开课' && active.openDate !== '') : false
    };
  });

  // ═══ 固定时间网格（每30分钟一行）═══
  const SLOT_MIN = 30; // 每格30分钟
  // 找到最早/最晚时间来确定范围
  let minH = 23, maxH = 8;
  SCHEDULE_DATA.forEach(sch => {
    (sch.sessions||[]).forEach(sess => {
      const sh = parseInt(sess.start.split(':')[0]);
      const eh = parseInt(sess.end.split(':')[0]) + (parseInt(sess.end.split(':')[1]) > 0 ? 1 : 0);
      if (sh < minH) minH = sh;
      if (eh > maxH) maxH = eh;
    });
  });
  // 向上取整到整点边界
  minH = Math.max(9, Math.floor(minH / 1) * 1);
  maxH = Math.min(21, Math.ceil(maxH / 1) * 1);

  // 生成所有时间格：["09:00","09:30","10:00",...]
  const timeGrid = [];
  for (let h = minH; h <= maxH; h++) {
    timeGrid.push(String(h).padStart(2,'0') + ':00');
    if (h < maxH) timeGrid.push(String(h).padStart(2,'0') + ':30');
  }

  // 构建占用表：occupied[day][slotIndex] = [ ...entries ] (支持同一格多个班级)
  // spanned[day][slotIndex] = 被 rowspan 占用的格子不输出 td
  const occupied = {};
  const spanned = {};
  for (let d = 0; d < 7; d++) { occupied[d] = {}; spanned[d] = {}; }

  SCHEDULE_DATA.forEach(sch => {
    (sch.sessions||[]).forEach(sess => {
      const day = sess.day;
      // 找到起始格索引（精确匹配，或找到第一个 >= start 的格）
      const startIdx = timeGrid.findIndex(t => t >= sess.start);
      if (startIdx < 0) return;
      // 计算跨多少格（向上取整）
      const startMin = parseInt(sess.start.split(':')[0])*60 + parseInt(sess.start.split(':')[1]);
      const endMin = parseInt(sess.end.split(':')[0])*60 + parseInt(sess.end.split(':')[1]);
      const spanSlots = Math.max(1, Math.ceil((endMin - startMin) / SLOT_MIN));
      const stats = classStats[sch.classId] || {count:0,remaining:sch.capacity||8,isOpened:false};
      const cls = _classes.find(c => c.id === sch.classId);
      const cssClass = stats.isOpened ? 'sch-opened' : 'sch-notopened';
      const displayName = cls ? cls.name.replace(/\(.+\)/,'') : sch.name;

      // 支持多个班级同一格：用数组
      if (!occupied[day][startIdx]) occupied[day][startIdx] = [];
      occupied[day][startIdx].push({ sch, sess, cssClass, displayName, stats, span: spanSlots });
      // 标记后续被占用的格子（rowspan）—— 只有单班级的格子才用 rowspan，多班级时每个班级高度固定不跨行
    });
  });

  // 对于每个格子，如果只有一个班级，才启用 rowspan；多个班级则 span=1 并列显示
  for (let d = 0; d < 7; d++) {
    Object.keys(occupied[d]).forEach(si => {
      const entries = occupied[d][si];
      if (entries.length === 1) {
        // 单班级：启用 rowspan，标记后续格子
        for (let s = 1; s < entries[0].span; s++) {
          spanned[d][parseInt(si) + s] = true;
        }
      } else {
        // 多班级：不跨行，每个班级 span 改为 1
        entries.forEach(e => { e.span = 1; });
      }
    });
  }

  // ═══ 构建表头 ═══
  let h = '<thead><tr><th style="width:40px">时间</th>';
  for (let d = 0; d < 7; d++) {
    const dt = new Date(ws); dt.setDate(dt.getDate() + d);
    const isToday = new Date().toDateString() === dt.toDateString();
    h += '<th class="day-hd">' + DAY_NAMES[d] +
      '<br><span style="font-weight:400;font-size:10px;color:'+(isToday?'#ef4444':'#94a3b8')+'">' +
      (dt.getMonth()+1) + '/' + dt.getDate() + (isToday?' ← 今天':'') + '</span></th>';
  }
  h += '</tr></thead><tbody>';

  // ═══ 每个时间格一行 ═══
  for (let si = 0; si < timeGrid.length; si++) {
    const timeLabel = timeGrid[si];
    h += '<tr>';
    h += '<td class="sch-time-label">' + timeLabel + '</td>';

    for (let d = 0; d < 7; d++) {
      if (spanned[d][si]) {
        // 被上方 rowspan 占用，不输出 td
        continue;
      }
      const entries = occupied[d][si];
      if (!entries || entries.length === 0) {
        h += '<td class="sch-cell"></td>';
      } else if (entries.length === 1) {
        // 单班级：rowspan 跨行
        const cell = entries[0];
        h += '<td class="sch-cell" rowspan="' + cell.span + '">' +
          '<div class="sch-block ' + cell.cssClass + '" onmouseenter="showSchTip(this)" onmouseleave="hideSchTip(this)">' +
            '<b>' + cell.displayName + '</b>' +
            '<span class="sch-time">' + cell.sess.start + '-' + cell.sess.end + '</span>' +
            '<div class="sch-tip"><h4>' + cell.displayName + '</h4>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">带班老师</span><span class="sch-tip-val">' + (cell.sch.teacher||'—') + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">阶段</span><span class="sch-tip-val">' + cell.sch.phase + '阶段</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">星期</span><span class="sch-tip-val">' + DAY_NAMES[d] + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">时间</span><span class="sch-tip-val">' + cell.sess.start + '-' + cell.sess.end + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">开课日期</span><span class="sch-tip-val">' + (cell.sch.openDate||'待定') + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">学员</span><span class="sch-tip-val">' + cell.stats.count + ' 人</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">剩余</span><span class="sch-tip-val" style="color:'+(cell.stats.remaining>0?'#4ade80':'#f87171')+'">' + cell.stats.remaining + ' 人</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">状态</span><span class="sch-tip-val">' + (cell.stats.isOpened ? '已开课' : '未开课') + '</span></div>' +
            '</div></div></td>';
      } else {
        // 多班级同一格：并排显示，不跨行
        h += '<td class="sch-cell" style="padding:0;">';
        entries.forEach(cell => {
          h += '<div class="sch-block ' + cell.cssClass + '" style="margin:1px;height:auto;min-height:18px;" onmouseenter="showSchTip(this)" onmouseleave="hideSchTip(this)">' +
            '<b>' + cell.displayName + '</b>' +
            '<span class="sch-time">' + cell.sess.start + '-' + cell.sess.end + '</span>' +
            '<div class="sch-tip"><h4>' + cell.displayName + '</h4>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">带班老师</span><span class="sch-tip-val">' + (cell.sch.teacher||'—') + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">阶段</span><span class="sch-tip-val">' + cell.sch.phase + '阶段</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">星期</span><span class="sch-tip-val">' + DAY_NAMES[d] + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">时间</span><span class="sch-tip-val">' + cell.sess.start + '-' + cell.sess.end + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">开课日期</span><span class="sch-tip-val">' + (cell.sch.openDate||'待定') + '</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">学员</span><span class="sch-tip-val">' + cell.stats.count + ' 人</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">剩余</span><span class="sch-tip-val" style="color:'+(cell.stats.remaining>0?'#4ade80':'#f87171')+'">' + cell.stats.remaining + ' 人</span></div>' +
              '<div class="sch-tip-row"><span class="sch-tip-lbl">状态</span><span class="sch-tip-val">' + (cell.stats.isOpened ? '已开课' : '未开课') + '</span></div>' +
            '</div></div>';
        });
        h += '</td>';
      }
    }
    h += '</tr>';
  }

  if (timeGrid.length === 0) {
    h += '<tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8">暂无排课数据，点击「✏️ 编辑排课」添加班级上课时间</td></tr>';
  }

  h += '</tbody>';
  document.getElementById('schTable').innerHTML = h;
}

function showSchTip(el) { /* CSS hover already handles this */ }
function hideSchTip(el) { /* CSS handles */ }

function schWeekOffset(delta) {
  _schWeekOffset += delta;
  renderSchedule();

function exportSchedule() {
  const headers = ['带班老师','班级','阶段','星期','开始时间','结束时间','开课日期','学员数','剩余名额','状态'];
  const rows = [];
  SCHEDULE_DATA.forEach(sch => {
    const cls = _classes.find(c => c.id === sch.classId);
    const studs = _students.filter(s => s.class_id === sch.classId && s.status !== '毕业');
    const rem = Math.max(0, sch.capacity - studs.length);
    // 只保留两种状态
    const isOpened = sch.statusOverride !== '未开课' && sch.openDate !== '';
    sch.sessions.sort((a,b) => a.day - b.day || a.start.localeCompare(b.start));
    sch.sessions.forEach(sess => {
      rows.push([sch.teacher||'', cls.name, sch.phase + '阶段', DAY_NAMES[sess.day],
        sess.start, sess.end, sch.openDate||'待定', ''+studs.length, ''+rem, isOpened ? '已开课' : '未开课']);
    });
  });
  exportCSV(headers, rows, '课程表预览_' + new Date().toISOString().slice(0,10) + '.csv');
}

        '<label>老师：</label>' +
        '<select id="schEd_t_' + idx + '" style="padding:5px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px">' +

        '<input type="date" id="schEd_od_' + idx + '" value="' + (sch.openDate||'') + '" placeholder="留空=未开课" style="padding:5px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px">' +
        '<label style="margin-left:8px">容量：</label>' +
        '<input type="number" id="schEd_cap_' + idx + '" value="' + (sch.capacity||8) + '" min="1" max="30" style="width:60px;padding:5px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px">' +
      '</div>' +
      '<div><b style="font-size:12px;color:#475569">上课时段：</b></div>' +
      '<div id="schEd_sess_' + idx + '"></div>' +
      '<button type="button" class="btn btn-gray btn-sm" onclick="addEditorSessRow(' + idx + ')" style="margin-top:6px">+ 添加时段</button>' +
    '</div>';
  });
  body.innerHTML = html;
  // 填充每个班级的已有时段
  SCHEDULE_DATA.forEach((sch, idx) => {
    (sch.sessions||[]).forEach(sess => {
      addEditorSessRow(idx, sess.day, sess.start, sess.end);
    });
    // 如果没有时段，添加一行空白的
    if (!sch.sessions || !sch.sessions.length) addEditorSessRow(idx);
  });
  document.getElementById('schEditorModal').classList.add('show');
}

let _editorSessIdx = 0;
function addEditorSessRow(schIdx, day, start, end) {
  const container = document.getElementById('schEd_sess_' + schIdx);
  if (!container) return;
  const rIdx = _editorSessIdx++;
  const dayOpts = ['周一','周二','周三','周四','周五','周六','周日'].map((n,i) =>
    '<option value="' + i + '"' + (day===i ? ' selected' : '') + '>' + n + '</option>'
  ).join('');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:5px';
  div.id = 'edRow_' + rIdx;
  div.innerHTML =
    '<select id="edDay_' + rIdx + '" style="flex:1;padding:4px 7px;border:1px solid #cbd5e1;border-radius:5px;font-size:11.5px"><option value="">星期</option>' + dayOpts + '</select>' +
    '<input type="time" id="edStart_' + rIdx + '" value="' + (start||'') + '" placeholder="开始" style="flex:1;padding:4px 7px;border:1px solid #cbd5e1;border-radius:5px;font-size:11.5px">' +
    '<input type="time" id="edEnd_' + rIdx + '" value="' + (end||'') + '" placeholder="结束" style="flex:1;padding:4px 7px;border:1px solid #cbd5e1;border-radius:5px;font-size:11.5px">' +
    '<button type="button" onclick="this.parentElement.remove()" style="padding:3px 8px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:5px;cursor:pointer;font-size:11px">×</button>';
  container.appendChild(div);
}

function closeSchEditor() { document.getElementById('schEditorModal').classList.remove('show'); }

function saveSchEditor() {
  // 收集表单数据
  const errors = [];
  SCHEDULE_DATA.forEach((sch, idx) => {
    sch.teacher = document.getElementById('schEd_t_' + idx).value;
    sch.openDate = document.getElementById('schEd_od_' + idx).value;
    sch.capacity = parseInt(document.getElementById('schEd_cap_' + idx).value) || 8;
    // 收集时段
    const container = document.getElementById('schEd_sess_' + idx);
    if (!container) return;
    const sessions = [];
    container.querySelectorAll(':scope > div').forEach(row => {
      const rId = row.id.replace('edRow_','');
      const day = parseInt(document.getElementById('edDay_' + rId).value);
      const start = document.getElementById('edStart_' + rId).value;
      const end = document.getElementById('edEnd_' + rId).value;
      if (!isNaN(day) && start && end) {
        sessions.push({ day, start, period: start < '12' ? 'am' : (start < '18' ? 'pm' : 'eve'), end });
      }
    });
    sch.sessions = sessions;
    sch.statusOverride = sch.openDate ? undefined : '未开课';
    if (!sessions.length) errors.push(sch.name);
  });

  if (errors.length) {
    if (!confirm('以下班级没有填写任何上课时间：' + errors.join('、') + '\n\n确定要保存吗？')) return;
  }

  // 持久化到 localStorage
  try { localStorage.setItem('edusys_schedule', JSON.stringify(SCHEDULE_DATA)); localStorage.setItem('edusys_schedule_ver', String(SCHEDULE_VERSION)); } catch(e){}
  closeSchEditor();
  renderSchedule();
  showToast('排课已保存 ✓');
}

// 登录
const LOGIN_PWD = 'DK0308';

// 加载用户自定义排课数据（localStorage 持久化）
// SCHEDULE_VERSION 2 = day 约定 0=周一（旧版用 JS Date.getDay 0=周日，需迁移）
const SCHEDULE_VERSION = 4;
(function() {
  try {
    const savedVer = localStorage.getItem('edusys_schedule_ver') || '1';
    const saved = localStorage.getItem('edusys_schedule');
    if (!saved) return;
    let parsed = JSON.parse(saved);
    // 版本不匹配时：清除旧缓存，避免脏数据覆盖硬编码数据
    if (savedVer !== String(SCHEDULE_VERSION)) {
      console.log('[课程表] 检测到旧版排课缓存(v'+savedVer+')，已自动清除，使用系统默认排课');
      localStorage.removeItem('edusys_schedule');
      localStorage.setItem('edusys_schedule_ver', String(SCHEDULE_VERSION));
      return; // 直接使用代码中的硬编码数据（已是正确的 day 值）
    }
    // 版本匹配：允许 localStorage 覆盖（用户可能已通过弹窗编辑过排课）
    parsed.forEach(p => {
      const existing = SCHEDULE_DATA.find(s => s.classId === p.classId);
      if (existing) {
        Object.assign(existing, { teacher: p.teacher, sessions: p.sessions, openDate: p.openDate, capacity: p.capacity, statusOverride: p.statusOverride });
      } else {
        SCHEDULE_DATA.push(p); // 用户新增的班级
      }
    });
  } catch(e) {
    console.warn('[课程表] 排课缓存加载失败:', e);
  }
})();

function doLogin() {
  const input = document.getElementById('loginPwd').value;
  if (input === LOGIN_PWD) {
    sessionStorage.setItem('edusys_logged_in', '1');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginPwd').value = '';
    document.getElementById('loginPwd').focus();
  }
}

// 自动检测是否已登录（当前浏览器标签页有效）
if (sessionStorage.getItem('edusys_logged_in') === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadAll();
}
