<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK·邻里 教务系统（云同步版）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;min-height:100vh}
.nav{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:12px 28px;display:flex;gap:24px;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.nav h1{font-size:18px;font-weight:700;white-space:nowrap}
.nav .tabs{display:flex;gap:4px;flex-wrap:wrap}
.nav .tabs button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;transition:.2s;white-space:nowrap}
.nav .tabs button:hover,.nav .tabs button.active{background:rgba(255,255,255,.25);border-color:#fff}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin:16px 24px;padding:20px 24px}
.card h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input[type=number]{padding:7px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;background:#fff}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-weight:600;transition:.15s;white-space:nowrap}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-gray{background:#e2e8f0;color:#475569}.btn-gray:hover{background:#cbd5e1}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-xs{padding:2px 8px;font-size:10px;border-radius:4px}
.tbl{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{background:#f8fafc;padding:10px 8px;font-size:12px;color:#475569;font-weight:600;text-align:center;border-bottom:2px solid #e2e8f0;white-space:nowrap;position:sticky;top:0}
tbody td{padding:8px 8px;font-size:13px;text-align:center;border-bottom:1px solid #f1f5f9}
tbody tr:hover{background:#f8fafc}
.tag{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600}
.tag-k1{background:#dbeafe;color:#1e40af}.tag-k2{background:#d1fae5;color:#065f46}.tag-s{background:#ede9fe;color:#5b21b6}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px}
.modal .form-group{margin-bottom:14px}
.modal .form-group label{display:block;font-size:13px;color:#475569;font-weight:600;margin-bottom:5px}
.modal .form-group input,.modal .form-group select{width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
.modal .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.att-form{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.att-table-wrap{max-height:60vh;overflow-y:auto}
.att-table-wrap td input{width:60px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;text-align:center;font-size:13px}
.att-table-wrap td input.changed{background:#fef3c7;border-color:#f59e0b}
.pbar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;width:60px;display:inline-block;vertical-align:middle;margin-top:3px}
.pfill{height:100%;border-radius:3px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;z-index:300;opacity:0;transform:translateX(20px);transition:.3s;max-width:400px}
.toast.show{opacity:1;transform:translateX(0)}
.toast-ok{background:#10b981}.toast-err{background:#ef4444}
.section{display:none}.section.active{display:block}
.row-warn{background:#fff7ed !important}.row-warn td{color:#c2410c}
.badge-warn{font-size:9px;background:#f97316;color:#fff;padding:1px 6px;border-radius:10px;margin-left:4px}
.row-grad{background:#f1f5f9 !important;opacity:0.6}.row-grad td{color:#94a3b8}
.grad-tag{font-size:9px;background:#94a3b8;color:#fff;padding:1px 6px;border-radius:10px;margin-left:4px}
tr[draggable="true"]{cursor:grab}tr[draggable="true"]:active{cursor:grabbing}tr[draggable="true"]:hover{background:#f0f9ff!important}
tr.dragging{opacity:0.4;background:#dbeafe!important}
tr.drag-over-top td{box-shadow:inset 0 3px 0 0 #3b82f6}
tr.drag-over-bottom td{box-shadow:inset 0 -3px 0 0 #3b82f6}
.drag-hint{color:#cbd5e1;font-size:10px;user-select:none}tr:hover .drag-hint{color:#94a3b8}
.status-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;user-select:none}
.status-toggle input{margin:0}
.sync-bar{background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:8px 28px;display:flex;align-items:center;gap:10px;font-size:12px;flex-wrap:wrap}
.sync-bar b{font-size:13px}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#1e3a5f;z-index:999;display:flex;justify-content:center;align-items:center;flex-direction:column}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:90%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-size:22px;color:#1e3a5f;margin-bottom:6px}
.login-box .sub{font-size:13px;color:#94a3b8;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;text-align:center;outline:none;transition:.2s}
.login-box input:focus{border-color:#2563eb}
.login-box .err-msg{color:#ef4444;font-size:12px;margin-top:8px;display:none}
.login-box .btn-login{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;transition:.2s}
.login-box .btn-login:hover{background:#1d4ed8}
</style>
</head>
<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 DK·邻里 教务系统</h2>
    <div class="sub">请输入密码以访问系统</div>
    <input type="password" id="loginPwd" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()" autofocus>
    <div class="err-msg" id="loginErr">密码错误，请重试</div>
    <button class="btn-login" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- 主内容（登录后显示） -->
<div id="app" style="display:none">

<div class="toast" id="toast"></div>

<!-- 同步状态栏 -->
<div class="sync-bar">
  <span>☁️ <b>云同步</b> — 所有修改实时保存到云端</span>
  <span style="margin-left:auto;font-size:11px;opacity:0.8" id="syncStatus">连接中...</span>
</div>

<!-- 导航 -->
<div class="nav">
  <h1>DK·邻里 教务系统</h1>
  <div class="tabs">
    <button class="active" onclick="switchTab('classes')">班级管理</button>
    <button onclick="switchTab('students')">学员出勤</button>
    <button onclick="switchTab('attendance')">课时登记</button>
    <button onclick="switchTab('stats')">班级排课</button>
  </div>
</div>

<!-- Tab 1: 班级管理 -->
<div class="section active" id="sec-classes">
  <div class="card">
    <h2>班级列表 <button class="btn btn-primary btn-sm" onclick="openClassModal()">＋ 新增班级</button></h2>
    <div class="tbl"><table>
      <thead><tr>
        <th style="text-align:left;width:140px">班级名称</th><th style="width:60px">阶段</th>
        <th style="width:80px">排课频率</th><th style="width:80px">阶段总课时</th>
        <th style="width:80px">年前已上</th><th style="width:100px">学员数</th>
        <th style="width:120px">操作</th>
      </tr></thead>
      <tbody id="classTbody"></tbody>
    </table></div>
  </div>
</div>

<!-- Tab 2: 学员出勤 -->
<div class="section" id="sec-students">
  <div class="card">
    <h2>学员列表
      <select id="stuClassFilter" onchange="renderStudents()" style="margin-left:12px;padding:6px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px">
        <option value="all">全部班级</option>
      </select>
      <label class="status-toggle" style="margin-left:12px;font-size:13px">
        <input type="checkbox" id="showGraduated" onchange="renderStudents()"> 显示毕业学员
      </label>
      <button class="btn btn-primary btn-sm" onclick="openStudentModal()" style="margin-left:auto">＋ 新增学员</button>
    </h2>
    <div class="tbl"><table>
      <thead id="stuThead"><tr>
        <th style="width:50px">拖拽</th><th style="text-align:left;width:100px">姓名</th><th style="width:120px">班级</th>
        <th style="width:80px">合计</th><th style="width:90px">缴费课时</th><th style="width:90px">剩余课时</th>
        <th style="width:130px">操作</th>
      </tr></thead>
      <tbody id="stuTbody"></tbody>
    </table></div>
  </div>
</div>

<!-- Tab 3: 课时登记 -->
<div class="section" id="sec-attendance">
  <div class="card">
    <h2>课时登记</h2>
    <div class="att-form">
      <label>班级：<select id="attClass" onchange="renderAttendance()"><option value="">请选择班级</option></select></label>
      <label>年：<input type="number" id="attYear" value="2026" min="2020" max="2030" style="width:70px" onchange="renderAttendance()"></label>
      <label>月：<select id="attMonth" onchange="renderAttendance()">
        <option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6" selected>6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select></label>
      <button class="btn btn-success" onclick="markAllPresent()">一键全勤</button>
      <button class="btn btn-primary" onclick="saveAttendance()">保存登记</button>
      <span style="font-size:12px;color:#94a3b8;margin-left:8px" id="attInfo"></span>
    </div>
    <div class="att-table-wrap"><table><thead><tr>
      <th style="text-align:left;width:100px">学员姓名</th><th style="width:120px">出勤课时</th>
    </tr></thead><tbody id="attTbody"></tbody></table></div>
  </div>
</div>

<!-- Tab 4: 班级排课 -->
<div class="section" id="sec-stats">
  <div class="card">
    <h2>班级排课进度 <button class="btn btn-success btn-sm" onclick="saveClassProgress()">保存修改</button>
      <button class="btn btn-gray btn-sm" onclick="renderClassProgress()">重置</button></h2>
    <div class="tbl"><table><thead><tr>
      <th style="text-align:left">班级</th><th>年前已上</th><th>3月排课</th><th>4月排课</th><th>5月排课</th><th>6月排课</th>
      <th>累计已上</th><th>阶段总课时</th><th>进度</th><th>状态</th>
    </tr></thead><tbody id="statsTbody"></tbody></table></div>
  </div>
</div>

<!-- 弹窗：班级 -->
<div class="modal-overlay" id="classModal">
  <div class="modal">
    <h3 id="classModalTitle">新增班级</h3>
    <input type="hidden" id="classEditId">
    <div class="form-group"><label>班级名称</label><input id="className" placeholder="如 K1005(三六)"></div>
    <div class="form-group"><label>阶段</label><select id="classPhase"><option value="K1">K1</option><option value="K2">K2</option><option value="S">S</option></select></div>
    <div class="form-group"><label>排课频率（节/月）</label><input type="number" id="classFreq" value="8" min="1"></div>
    <div class="form-group"><label>阶段总课时</label><input type="number" id="classTotal" value="88" min="1"></div>
    <div class="form-group"><label>年前已上课时</label><input type="number" id="classBefore" value="0" min="0"></div>
    <div class="form-actions"><button class="btn btn-gray" onclick="closeClassModal()">取消</button><button class="btn btn-primary" onclick="saveClass()">保存</button></div>
  </div>
</div>

<!-- 弹窗：学员 -->
<div class="modal-overlay" id="stuModal">
  <div class="modal">
    <h3 id="stuModalTitle">新增学员</h3>
    <input type="hidden" id="stuEditId">
    <div class="form-group"><label>学员姓名</label><input id="stuName" placeholder="学员全名"></div>
    <div class="form-group"><label>所属班级</label><select id="stuClass"></select></div>
    <div class="form-group"><label>缴费课时数</label><input type="number" id="stuPaid" value="0" min="0"></div>
    <div class="form-group"><label>学员状态</label><select id="stuStatus"><option value="在读">在读</option><option value="毕业">毕业</option></select></div>
    <div class="form-actions"><button class="btn btn-gray" onclick="closeStudentModal()">取消</button><button class="btn btn-primary" onclick="saveStudent()">保存</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ═══════════════════════════════════════
// Supabase 云数据库初始化
// ═══════════════════════════════════════
const SB_URL = 'https://chasxggorljjqqmficnh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoYXN4Z2dvcmxqanFxbWZpY25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDI1NzIsImV4cCI6MjA5NzA3ODU3Mn0.E0xlNCX_jFn8X9LheAR3jFHokzWSkZlXkBDReqTvL6c';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// 数据缓存
let _classes = [], _students = [], _attendance = [];

async function syncStatus(msg) {
  document.getElementById('syncStatus').textContent = msg;
}

async function loadAll() {
  syncStatus('加载中...');
  const [cr, sr, ar] = await Promise.all([
    sb.from('classes').select('*').order('id'),
    sb.from('students').select('*').order('sort_order'),
    sb.from('attendance').select('*')
  ]);
  if (cr.error) { showToast('加载班级失败: '+cr.error.message, false); return; }
  if (sr.error) { showToast('加载学员失败: '+sr.error.message, false); return; }
  if (ar.error) { showToast('加载课时失败: '+ar.error.message, false); return; }
  _classes = cr.data; _students = sr.data; _attendance = ar.data;
  syncStatus('已同步 ' + _students.length + ' 名学员');
  initApp();
}

// ═══════════════════════════════════════
// 工具
// ═══════════════════════════════════════
function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err') + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}

function calcRemaining(sid) {
  const s = _students.find(x => x.id === sid);
  if (!s) return 0;
  const paid = s.paid_hours || 0;
  const consumed = _attendance.filter(a => a.student_id === sid).reduce((sum, a) => sum + (a.hours || 0), 0);
  return Math.max(0, Math.round((paid - consumed) * 10) / 10);
}

function getClassName(cid) {
  const c = _classes.find(x => x.id === cid);
  return c ? c.name : '未知班级';
}

// ═══════════════════════════════════════
// Tab 切换
// ═══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  const map = {classes:'sec-classes',students:'sec-students',attendance:'sec-attendance',stats:'sec-stats'};
  const idx = {classes:0,students:1,attendance:2,stats:3};
  document.getElementById(map[tab]).classList.add('active');
  document.querySelectorAll('.tabs button')[idx[tab]].classList.add('active');
  if (tab==='classes') renderClasses();
  if (tab==='students') { fillStuClassFilter(); renderStudents(); }
  if (tab==='attendance') { fillAttClass(); renderAttendance(); }
  if (tab==='stats') renderClassProgress();
}

// ═══════════════════════════════════════
// Tab 1: 班级管理
// ═══════════════════════════════════════
function renderClasses() {
  // 修复: 只统计在读学员，排除已毕业
  const countMap = {};
  _students.filter(s => s.status !== '毕业').forEach(s => { countMap[s.class_id] = (countMap[s.class_id]||0) + 1; });
  let html = '';
  _classes.forEach(c => {
    const phase = c.phase || '';
    html += '<tr>' +
      '<td style="text-align:left;font-weight:600">' + c.name + ' <span class="tag tag-' + (phase||'k1').toLowerCase() + '">' + phase + '阶段</span></td>' +
      '<td>' + phase + '</td>' +
      '<td>' + (c.freq||0) + ' 节/月</td>' +
      '<td><b>' + (c.total_hours||0) + '</b></td>' +
      '<td>' + (c.before_hours||0) + '</td>' +
      '<td>' + (countMap[c.id]||0) + ' 人</td>' +
      '<td><button class="btn btn-gray btn-xs" onclick="editClass(' + c.id + ')">✏️</button> ' +
      '<button class="btn btn-danger btn-xs" onclick="deleteClass(' + c.id + ')">🗑</button></td></tr>';
  });
  document.getElementById('classTbody').innerHTML = html || '<tr><td colspan="7" style="color:#94a3b8;padding:30px">暂无班级</td></tr>';
}

function openClassModal(cid) {
  document.getElementById('classEditId').value = cid || '';
  document.getElementById('classModalTitle').textContent = cid ? '编辑班级' : '新增班级';
  if (cid) {
    const c = _classes.find(x => x.id === cid);
    if (c) {
      document.getElementById('className').value = c.name;
      document.getElementById('classPhase').value = c.phase || 'K1';
      document.getElementById('classFreq').value = c.freq || 0;
      document.getElementById('classTotal').value = c.total_hours || 0;
      document.getElementById('classBefore').value = c.before_hours || 0;
    }
  } else {
    document.getElementById('className').value = '';
    document.getElementById('classPhase').value = 'K1';
    document.getElementById('classFreq').value = 8;
    document.getElementById('classTotal').value = 88;
    document.getElementById('classBefore').value = 0;
  }
  document.getElementById('classModal').classList.add('show');
}

function closeClassModal() { document.getElementById('classModal').classList.remove('show'); }

async function saveClass() {
  const name = document.getElementById('className').value.trim();
  if (!name) { showToast('请输入班级名称', false); return; }
  const data = {
    name: name,
    phase: document.getElementById('classPhase').value,
    freq: parseFloat(document.getElementById('classFreq').value) || 0,
    total_hours: parseFloat(document.getElementById('classTotal').value) || 0,
    before_hours: parseFloat(document.getElementById('classBefore').value) || 0
  };
  const editId = document.getElementById('classEditId').value;
  if (editId) {
    const { error } = await sb.from('classes').update(data).eq('id', parseInt(editId));
    if (error) { showToast('更新失败: '+error.message, false); return; }
    showToast('班级已更新');
  } else {
    const maxId = _classes.reduce((m, c) => Math.max(m, c.id), 0);
    data.id = maxId + 1;
    const { error } = await sb.from('classes').insert(data);
    if (error) { showToast('新增失败: '+error.message, false); return; }
    showToast('班级已新增');
  }
  closeClassModal();
  await loadAll();
  renderClasses();
}

async function editClass(cid) {
  openClassModal(cid);
}

async function deleteClass(cid) {
  const name = getClassName(cid);
  const studentCount = _students.filter(s => s.class_id === cid).length;
  let msg = '确定删除班级 "' + name + '"？';
  if (studentCount > 0) {
    msg += '\n\n⚠️ 该班级下有 ' + studentCount + ' 名学员。';
    msg += '\n学员与课时记录将保留（学员变为「无班级」）。';
  }
  if (!confirm(msg)) return;
  // 先解除学员关联，避免外键冲突
  await sb.from('students').update({class_id: null}).eq('class_id', cid);
  const { error } = await sb.from('classes').delete().eq('id', cid);
  if (error) { showToast('删除失败: '+error.message, false); return; }
  showToast('班级已删除');
  await loadAll();
  renderClasses();
}

// ═══════════════════════════════════════
// Tab 2: 学员出勤
// ═══════════════════════════════════════
function fillStuClassFilter() {
  const sel = document.getElementById('stuClassFilter');
  sel.innerHTML = '<option value="all">全部班级</option>';
  _classes.forEach(c => { sel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
}

async function renderStudents() {
  const filterId = document.getElementById('stuClassFilter').value;
  const showGrad = document.getElementById('showGraduated').checked;
  const classMap = {};
  _classes.forEach(c => { classMap[c.id] = c.name; });
  
  // Filter students
  let list = _students.filter(s => showGrad || s.status !== '毕业');
  if (filterId !== 'all') list = list.filter(s => s.class_id === parseInt(filterId));
  
  // Group by class
  const groups = {};
  list.forEach(s => {
    const cid = s.class_id || 0;
    if (!groups[cid]) groups[cid] = [];
    groups[cid].push(s);
  });
  
  let html = '';
  const orderedCids = Object.keys(groups).sort((a,b) => {
    const ca = _classes.find(x => x.id === parseInt(a));
    const cb = _classes.find(x => x.id === parseInt(b));
    return (ca?.id||0) - (cb?.id||0);
  });
  
  orderedCids.forEach(cid => {
    const cname = classMap[parseInt(cid)] || '无班级';
    html += '<tr class="cls-header"><td colspan="7" style="text-align:left;padding:10px 8px"><b>' + cname + '</b></td></tr>';
    groups[cid].sort((a,b) => (a.sort_order||0) - (b.sort_order||0)).forEach((s, idx) => {
      const rem = calcRemaining(s.id);
      const consumed = (s.paid_hours||0) - rem;
      const isGrad = s.status === '毕业';
      const isWarn = !isGrad && rem < 15 && rem > 0;
      const rowClass = isGrad ? 'row-grad' : (isWarn ? 'row-warn' : '');
      html += '<tr class="' + rowClass + '" draggable="true" ' +
        'ondragstart="dragStart(event,' + s.id + ')" ' +
        'ondragover="dragOver(event,' + s.id + ',this)" ' +
        'ondragleave="dragLeave(event,this)" ' +
        'ondrop="dropStudent(event,' + s.id + ')" ' +
        'data-sid="' + s.id + '">' +
        '<td><span class="drag-hint">⋮⋮</span></td>' +
        '<td style="text-align:left;font-weight:600">' + s.name +
          (isGrad ? '<span class="grad-tag">毕业</span>' : '') +
          (isWarn ? '<span class="badge-warn">续费</span>' : '') + '</td>' +
        '<td>' + cname + '</td>' +
        '<td>' + consumed.toFixed(1) + '</td>' +
        '<td>' + (s.paid_hours||0) + '</td>' +
        '<td><b style="color:' + (rem < 15 ? '#f97316' : '#2563eb') + '">' + rem + '</b></td>' +
        '<td>' +
          '<label class="status-toggle" onclick="toggleStatus(' + s.id + ')" title="切换在读/毕业">' +
          '<input type="checkbox" ' + (isGrad ? '' : 'checked') + '>' +
          '<span>' + (isGrad ? '已毕业' : '在读') + '</span>' +
          '</label> ' +
          '<button class="btn btn-gray btn-xs" onclick="editStudent(' + s.id + ')">✏️</button> ' +
          '<button class="btn btn-danger btn-xs" onclick="deleteStudent(' + s.id + ')">🗑</button>' +
        '</td></tr>';
    });
  });
  
  document.getElementById('stuTbody').innerHTML = html || '<tr><td colspan="7" style="color:#94a3b8;padding:30px">暂无学员</td></tr>';
}

async function toggleStatus(sid) {
  const s = _students.find(x => x.id === sid);
  if (!s) return;
  const newStatus = s.status === '毕业' ? '在读' : '毕业';
  const { error } = await sb.from('students').update({status: newStatus}).eq('id', sid);
  if (error) { showToast('更新失败', false); return; }
  await loadAll();
  renderStudents();
  showToast(s.name + ' → ' + newStatus);
}

function openStudentModal(sid) {
  document.getElementById('stuEditId').value = sid || '';
  document.getElementById('stuModalTitle').textContent = sid ? '编辑学员' : '新增学员';
  // Fill class dropdown
  const sel = document.getElementById('stuClass');
  sel.innerHTML = '';
  _classes.forEach(c => { sel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
  
  if (sid) {
    const s = _students.find(x => x.id === sid);
    if (s) {
      document.getElementById('stuName').value = s.name;
      document.getElementById('stuClass').value = s.class_id || '';
      document.getElementById('stuPaid').value = s.paid_hours || 0;
      document.getElementById('stuStatus').value = s.status || '在读';
    }
  } else {
    document.getElementById('stuName').value = '';
    document.getElementById('stuPaid').value = 0;
    document.getElementById('stuStatus').value = '在读';
  }
  document.getElementById('stuModal').classList.add('show');
}

function closeStudentModal() { document.getElementById('stuModal').classList.remove('show'); }

async function saveStudent() {
  const name = document.getElementById('stuName').value.trim();
  if (!name) { showToast('请输入学员姓名', false); return; }
  const classId = parseInt(document.getElementById('stuClass').value) || null;
  const editId = document.getElementById('stuEditId').value;
  const data = {
    name: name,
    class_id: classId,
    paid_hours: parseFloat(document.getElementById('stuPaid').value) || 0,
    status: document.getElementById('stuStatus').value
  };
  if (editId) {
    // 修复 Bug #1: 编辑时不覆写 remaining_hours，由 calcRemaining() 动态计算
    const { error } = await sb.from('students').update(data).eq('id', parseInt(editId));
    if (error) { showToast('更新失败: '+error.message, false); return; }
    showToast('学员已更新');
  } else {
    // 新增学员：remaining_hours 初始值 = paid_hours（尚无出勤消耗）
    data.remaining_hours = data.paid_hours;
    const maxId = _students.reduce((m, s) => Math.max(m, s.id), 0);
    data.id = maxId + 1;
    data.sort_order = 0;
    const { error } = await sb.from('students').insert(data);
    if (error) { showToast('新增失败: '+error.message, false); return; }
    showToast('学员已新增');
  }
  closeStudentModal();
  await loadAll();
  renderStudents();
}

async function editStudent(sid) { openStudentModal(sid); }

async function deleteStudent(sid) {
  const s = _students.find(x => x.id === sid);
  if (!confirm('确定删除学员 "' + (s?.name||'') + '"？\n其课时记录也将一并删除。')) return;
  await sb.from('attendance').delete().eq('student_id', sid);
  const { error } = await sb.from('students').delete().eq('id', sid);
  if (error) { showToast('删除失败: '+error.message, false); return; }
  showToast('学员已删除');
  await loadAll();
  renderStudents();
}

// ── 拖拽排序 ──
let draggedSid = null;
function dragStart(event, sid) {
  draggedSid = sid;
  const row = event.currentTarget;
  setTimeout(() => row.classList.add('dragging'), 0);
}
function dragOver(event, sid, rowEl) {
  event.preventDefault();
  const rect = rowEl.getBoundingClientRect();
  const mid = (rect.top + rect.bottom) / 2;
  rowEl.classList.remove('drag-over-top', 'drag-over-bottom');
  rowEl.classList.add(event.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
}
function dragLeave(event, rowEl) {
  rowEl.classList.remove('drag-over-top', 'drag-over-bottom');
}
async function dropStudent(event, targetSid) {
  event.preventDefault();
  const row = event.currentTarget;
  row.classList.remove('drag-over-top', 'drag-over-bottom');
  if (!draggedSid || draggedSid === targetSid) return;
  
  const dragS = _students.find(x => x.id === draggedSid);
  const targetS = _students.find(x => x.id === targetSid);
  if (!dragS || !targetS) return;
  
  // Only allow drag within same class
  if (dragS.class_id !== targetS.class_id) {
    showToast('只能在同一班级内拖拽排序', false);
    return;
  }
  
  const sameClass = _students.filter(s => s.class_id === dragS.class_id).sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  const dragIdx = sameClass.findIndex(s => s.id === draggedSid);
  const targetIdx = sameClass.findIndex(s => s.id === targetSid);
  if (dragIdx < 0 || targetIdx < 0) return;
  
  sameClass.splice(dragIdx, 1);
  sameClass.splice(targetIdx, 0, dragS);
  
  // Batch update
  const updates = sameClass.map((s, i) => ({ id: s.id, sort_order: i }));
  for (const u of updates) {
    await sb.from('students').update({sort_order: u.sort_order}).eq('id', u.id);
  }
  
  await loadAll();
  renderStudents();
  showToast('排序已保存');
}

// ═══════════════════════════════════════
// Tab 3: 课时登记
// ═══════════════════════════════════════
function fillAttClass() {
  const sel = document.getElementById('attClass');
  sel.innerHTML = '<option value="">请选择班级</option>';
  _classes.forEach(c => { sel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
}

async function renderAttendance() {
  const cid = parseInt(document.getElementById('attClass').value);
  const year = parseInt(document.getElementById('attYear').value);
  const month = parseInt(document.getElementById('attMonth').value);
  if (!cid) { document.getElementById('attTbody').innerHTML = ''; document.getElementById('attInfo').textContent = ''; return; }
  
  const classStudents = _students.filter(s => s.class_id === cid && s.status !== '毕业');
  const freq = _classes.find(c => c.id === cid)?.freq || 8;
  document.getElementById('attInfo').textContent = classStudents.length + ' 名学员 · 排课' + freq + '节/月';
  
  let html = '';
  classStudents.forEach(s => {
    const rec = _attendance.find(a => a.student_id === s.id && a.year === year && a.month === month);
    const hours = rec ? (rec.hours || 0) : 0;
    html += '<tr>' +
      '<td style="text-align:left;font-weight:500">' + s.name + '</td>' +
      '<td><input type="number" step="0.5" min="0" value="' + hours + '" data-sid="' + s.id + '" class="att-input"></td>' +
      '</tr>';
  });
  document.getElementById('attTbody').innerHTML = html || '<tr><td colspan="2" style="color:#94a3b8;padding:20px">该班级暂无在读学员</td></tr>';
}

function markAllPresent() {
  const cid = parseInt(document.getElementById('attClass').value);
  if (!cid) return;
  const freq = _classes.find(c => c.id === cid)?.freq || 8;
  document.querySelectorAll('.att-input').forEach(inp => { inp.value = freq; inp.classList.add('changed'); });
}

async function saveAttendance() {
  const cid = parseInt(document.getElementById('attClass').value);
  const year = parseInt(document.getElementById('attYear').value);
  const month = parseInt(document.getElementById('attMonth').value);
  if (!cid) { showToast('请选择班级', false); return; }
  
  const inputs = document.querySelectorAll('.att-input');
  const records = [];
  inputs.forEach(inp => {
    const sid = parseInt(inp.dataset.sid);
    const hours = parseFloat(inp.value) || 0;
    records.push({ student_id: sid, year: year, month: month, hours: hours });
  });
  
  if (records.length === 0) { showToast('没有可保存的记录', false); return; }
  
  // 修复 Bug #4: 批量 upsert，避免部分成功/部分失败导致数据不一致
  const { error } = await sb.from('attendance').upsert(records, { onConflict: 'student_id,year,month' });
  if (error) { showToast('保存失败: '+error.message, false); return; }
  
  await loadAll();
  renderAttendance();
  showToast('已保存 ' + records.length + ' 条记录');
}

// ═══════════════════════════════════════
// Tab 4: 班级排课
// ═══════════════════════════════════════
function renderClassProgress() {
  let html = '';
  const months = [3,4,5,6];
  const mkeys = ['m3','m4','m5','m6'];
  
  _classes.forEach(c => {
    const totalHours = c.total_hours || 0;
    const before = c.before_hours || 0;
    const monthlySum = months.reduce((s, m, i) => s + (c[mkeys[i]] || 0), 0);
    const cumulative = monthlySum;  // "累计已上" = 仅当年排课（不含年前已上）
    // 进度 = 累计已上 / 阶段总课时（本年度完成进度）
    const pct = totalHours > 0 ? Math.round(cumulative / totalHours * 100) : 0;
    
    // 状态分级
    // 未开课: 阶段总课时>0 且 累计已上=0 （当年从未排课/未开班）
    // 刚起步: 0% < 进度 < 25%
    // 进行中: 25% ≤ 进度 < 50%
    // 过半:   50% ≤ 进度 < 75%
    // 接近完成: 75% ≤ 进度 < 100%
    // 已完成: 进度 ≥ 100%
    // 未设置: 阶段总课时 = 0
    let barColor = '#94a3b8', statusText = '';
    if (totalHours === 0) { statusText = '未设置'; }
    else if (cumulative === 0) { barColor = '#94a3b8'; statusText = '未开课'; }
    else if (pct >= 100) { barColor = '#10b981'; statusText = '已完成'; }
    else if (pct >= 75) { barColor = '#8b5cf6'; statusText = '接近完成'; }
    else if (pct >= 50) { barColor = '#3b82f6'; statusText = '过半'; }
    else if (pct >= 25) { barColor = '#f59e0b'; statusText = '进行中'; }
    else { barColor = '#f97316'; statusText = '刚起步'; }
    
    html += '<tr>' +
      '<td style="text-align:left;font-weight:600">' + c.name + '</td>' +
      '<td><input type="number" value="' + before + '" data-cid="' + c.id + '" data-field="before_hours" style="width:60px;text-align:center"></td>' +
      months.map((m, i) => '<td><input type="number" value="' + (c[mkeys[i]]||0) + '" data-cid="' + c.id + '" data-field="' + mkeys[i] + '" style="width:60px;text-align:center"></td>').join('') +
      '<td><b>' + cumulative + '</b></td>' +
      '<td><b>' + totalHours + '</b></td>' +
      '<td><div style="display:flex;align-items:center;gap:6px;justify-content:center">' +
        '<div class="pbar"><div class="pfill" style="width:' + Math.min(100,pct) + '%;background:' + barColor + '"></div></div>' +
        '<span style="font-size:11px">' + pct + '%</span></div></td>' +
      '<td><span style="color:' + barColor + ';font-weight:600;font-size:12px">' + statusText + '</span></td>' +
      '</tr>';
  });
  document.getElementById('statsTbody').innerHTML = html;
}

async function saveClassProgress() {
  const inputs = document.querySelectorAll('#statsTbody input');
  let count = 0;
  for (const inp of inputs) {
    const cid = parseInt(inp.dataset.cid);
    const field = inp.dataset.field;
    const value = parseFloat(inp.value) || 0;
    const { error } = await sb.from('classes').update({[field]: value}).eq('id', cid);
    if (error) { showToast('保存失败: '+error.message, false); return; }
    count++;
  }
  await loadAll();
  renderClassProgress();
  showToast('已保存 ' + count + ' 项排课数据');
}

// ═══════════════════════════════════════
// 初始化
// ═══════════════════════════════════════
function initApp() {
  renderClasses();
  fillStuClassFilter();
  renderStudents();
  fillAttClass();
  renderAttendance();
  renderClassProgress();
}
